<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模式设置 - 星语心伴</title>
    <meta name="description" content="默认可直接使用本地陪伴模式，远程模型只作为增强选项存在。">
    <link rel="stylesheet" href="../assets/css/all.min.css">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/unified-ui.css">
    <style>
        .settings-main {
            padding-top: 0;
            padding-bottom: 120px;
        }

        .settings-shell {
            display: grid;
            gap: 20px;
            padding: 0 16px 24px;
        }

        .settings-hero {
            display: grid;
            gap: 14px;
        }

        .settings-hero p {
            font-size: 13px;
            line-height: 1.8;
            color: var(--ui-text-soft);
        }

        .hero-mark {
            width: 54px;
            height: 54px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.82);
            color: var(--ui-text);
        }

        .hero-mark .svg-icon {
            width: 26px;
            height: 26px;
        }

        .settings-grid {
            display: grid;
            gap: 16px;
        }

        .api-card {
            display: grid;
            gap: 14px;
            padding: 20px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.92);
            box-shadow: var(--ui-shadow-md);
        }

        .api-card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .api-name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 600;
            color: var(--ui-text);
        }

        .api-provider {
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.84);
            color: var(--ui-text-soft);
            font-size: 12px;
        }

        .api-details {
            display: grid;
            gap: 8px;
            color: var(--ui-text-soft);
            font-size: 13px;
            line-height: 1.75;
        }

        .api-actions,
        .settings-toolbar,
        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-inline {
            min-height: 42px;
            padding: 0 16px;
            border: 1px solid rgba(255, 255, 255, 0.92);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.88);
            color: var(--ui-text);
            cursor: pointer;
            box-shadow: var(--ui-shadow-sm);
        }

        .btn-inline.primary {
            background: var(--primary-gradient);
            color: white;
            border-color: transparent;
        }

        .btn-inline.danger {
            background: linear-gradient(135deg, #ef7d83 0%, #dd5864 100%);
            color: white;
            border-color: transparent;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            min-height: 32px;
            padding: 0 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge.active {
            background: rgba(138, 216, 198, 0.22);
            color: #1d6d61;
        }

        .status-badge.inactive {
            background: rgba(255, 255, 255, 0.84);
            color: var(--ui-text-soft);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(28, 49, 69, 0.24);
            backdrop-filter: blur(12px);
            z-index: 2400;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            width: min(480px, 100%);
            max-height: 84vh;
            overflow-y: auto;
            padding: 24px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.96);
            box-shadow: var(--ui-shadow-lg);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--ui-text);
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.88);
            color: var(--ui-text);
            cursor: pointer;
        }

        .form-group {
            display: grid;
            gap: 8px;
            margin-bottom: 16px;
        }

        .form-group label {
            font-size: 13px;
            color: var(--ui-text-soft);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            min-height: 48px;
            padding: 12px 14px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.94);
            background: rgba(255, 255, 255, 0.92);
            color: var(--ui-text);
        }

        .test-result {
            display: none;
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 18px;
            font-size: 13px;
            line-height: 1.7;
        }

        .test-result.success {
            display: block;
            background: rgba(138, 216, 198, 0.18);
            color: #1d6d61;
            border: 1px solid rgba(138, 216, 198, 0.28);
        }

        .test-result.error {
            display: block;
            background: rgba(255, 143, 123, 0.14);
            color: #b45447;
            border: 1px solid rgba(255, 143, 123, 0.24);
        }

        @media (max-width: 720px) {
            .api-card-head,
            .api-actions,
            .settings-toolbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .btn-inline {
                width: 100%;
            }
        }
    </style>
</head>
<body data-theme="adult">
    <div class="stars-bg" id="starsBg"></div>

    <div class="app-container">
        <header class="page-header" style="padding: 16px;">
            <a href="profile.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div style="text-align: center;">
                <h1 class="page-title">模式设置</h1>
                <p class="page-subtitle" style="margin-top: 4px;">默认就能用，增强按需开</p>
            </div>
            <div class="placeholder"></div>
        </header>

        <main class="content-section settings-main">
            <div class="settings-shell">
                <section class="assistant-spotlight settings-hero" data-reveal>
                    <div class="hero-mark" aria-hidden="true">
                        <svg class="svg-icon" viewBox="0 0 24 24">
                            <path d="M12 3v3"></path>
                            <path d="M12 18v3"></path>
                            <path d="M4.5 12h3"></path>
                            <path d="M16.5 12h3"></path>
                            <circle cx="12" cy="12" r="3.5"></circle>
                        </svg>
                    </div>
                    <span class="spotlight-kicker">
                        <i class="fas fa-house-signal"></i>
                        纯前端主链路
                    </span>
                    <h2 class="spotlight-title">先直接用本地陪伴，再决定要不要增强。</h2>
                    <p>这里的原则很简单：本地模式常驻可用，远程模型只是为了让回复更强，不再是使用门槛。</p>
                    <div class="btn-row">
                        <a class="btn btn-secondary" href="chat.html">去聊天页</a>
                        <button class="btn btn-secondary" id="addApiBtn">添加远程模型</button>
                    </div>
                </section>

                <section class="settings-grid" data-reveal>
                    <div class="api-surface">
                        <h3>推荐顺序</h3>
                        <p>先跑通陪伴链路，再决定是否接入 OpenAI、Gemini 或兼容接口。</p>
                    </div>

                    <div class="rail-card">
                        <h3 style="margin-bottom: 12px;">内置本地模式</h3>
                        <div id="builtinCard"></div>
                    </div>

                    <div class="rail-card">
                        <div class="api-card-head" style="margin-bottom: 14px;">
                            <div>
                                <h3>远程增强模型</h3>
                                <p class="section-note">这些配置只会保存在当前浏览器本地。</p>
                            </div>
                        </div>
                        <div id="apiList"></div>
                    </div>
                </section>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="../index.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>首页</span>
            </a>
            <a href="test.html" class="nav-item">
                <i class="fas fa-clipboard-list"></i>
                <span>测评</span>
            </a>
            <a href="chat.html" class="nav-item">
                <i class="fas fa-comment-dots"></i>
                <span>聊天</span>
            </a>
            <a href="horoscope.html" class="nav-item">
                <i class="fas fa-stars"></i>
                <span>运势</span>
            </a>
            <a href="profile.html" class="nav-item active">
                <i class="fas fa-user"></i>
                <span>我的</span>
            </a>
        </nav>
    </div>

    <div class="modal-overlay" id="apiModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">添加远程模型</h3>
                <button class="modal-close" id="closeModal" aria-label="关闭">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <form id="apiForm">
                <div class="form-group">
                    <label for="apiName">配置名称</label>
                    <input type="text" id="apiName" placeholder="比如：我的 GPT-4o" required>
                </div>

                <div class="form-group">
                    <label for="apiProvider">模型提供方</label>
                    <select id="apiProvider">
                        <option value="openai">OpenAI</option>
                        <option value="gemini">Google Gemini</option>
                        <option value="custom">OpenAI 兼容接口</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="apiBaseUrl">Base URL</label>
                    <input type="url" id="apiBaseUrl" placeholder="https://api.openai.com/v1" required>
                </div>

                <div class="form-group">
                    <label for="apiKey">API Key</label>
                    <input type="password" id="apiKey" placeholder="sk-..." required>
                </div>

                <div class="form-group">
                    <label for="apiModel">模型名称</label>
                    <input type="text" id="apiModel" placeholder="gpt-4o-mini" required>
                </div>

                <div class="settings-toolbar">
                    <button type="button" class="btn-inline" id="testApiBtn">测试连接</button>
                    <button type="submit" class="btn-inline primary">保存配置</button>
                </div>

                <div class="test-result" id="testResult"></div>
            </form>
        </div>
    </div>

    <script src="../dist/js/api-config.js"></script>
    <script src="../dist/js/page-api-settings.js"></script>
</body>
</html>
