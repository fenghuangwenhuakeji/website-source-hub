<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型设置 - 光玉中医健康工作台</title>
    <meta name="description" content="本项目自己的模型设置页，支持本地辅助解读和远程增强模型。">
    <link rel="stylesheet" href="../assets/css/all.min.css">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/unified-ui.css">
    <style>
        .settings-main { padding-top:0; padding-bottom:120px; }
        .settings-shell, .settings-grid { display:grid; gap:20px; padding:0 16px 24px; }
        .api-card, .settings-hero, .empty-card { display:grid; gap:14px; padding:20px; border-radius:28px; background:rgba(255,255,255,.82); border:1px solid rgba(255,255,255,.92); box-shadow: var(--ui-shadow-md); }
        .settings-hero p, .api-details, .empty-card p { font-size:13px; line-height:1.8; color: var(--ui-text-soft); }
        .api-card-head, .settings-toolbar, .api-actions, .btn-row, .modal-header { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
        .api-name { display:flex; align-items:center; gap:10px; font-size:16px; font-weight:600; color: var(--ui-text); }
        .api-provider, .status-badge { display:inline-flex; align-items:center; min-height:32px; padding:0 12px; border-radius:999px; font-size:12px; }
        .api-provider, .status-badge.inactive { background:rgba(255,255,255,.84); color: var(--ui-text-soft); }
        .status-badge.active { background: rgba(138,216,198,.22); color:#1d6d61; }
        .btn-inline { min-height:42px; padding:0 16px; border:1px solid rgba(255,255,255,.92); border-radius:16px; background:rgba(255,255,255,.88); color: var(--ui-text); cursor:pointer; box-shadow: var(--ui-shadow-sm); }
        .btn-inline.primary { background: var(--primary-gradient); color:white; border-color: transparent; }
        .btn-inline.danger { background: linear-gradient(135deg, #ef7d83 0%, #dd5864 100%); color:white; border-color: transparent; }
        .modal-overlay { position:fixed; inset:0; display:none; align-items:center; justify-content:center; padding:20px; background:rgba(28,49,69,.24); backdrop-filter: blur(12px); z-index:2400; }
        .modal-overlay.show { display:flex; }
        .modal-content { width:min(480px,100%); max-height:84vh; overflow-y:auto; padding:24px; border-radius:30px; background:rgba(255,255,255,.96); border:1px solid rgba(255,255,255,.96); box-shadow: var(--ui-shadow-lg); }
        .modal-title { font-size:18px; font-weight:700; color: var(--ui-text); }
        .modal-close { width:36px; height:36px; border:none; border-radius:50%; background:rgba(255,255,255,.88); color: var(--ui-text); cursor:pointer; }
        .form-group { display:grid; gap:8px; margin-bottom:16px; }
        .form-group label { font-size:13px; color: var(--ui-text-soft); }
        .form-group input, .form-group select { width:100%; min-height:48px; padding:12px 14px; border-radius:18px; border:1px solid rgba(255,255,255,.94); background:rgba(255,255,255,.92); color: var(--ui-text); }
        .test-result { padding:12px 14px; border-radius:18px; font-size:13px; line-height:1.8; }
        .test-result.success { background: rgba(138,216,198,.2); color:#1d6d61; }
        .test-result.error { background: rgba(239,125,131,.18); color:#a11f31; }
    </style>
</head>
<body data-theme="adult">
    <div class="stars-bg" id="starsBg"></div>
    <div class="app-container">
        <header class="page-header" style="padding:16px;">
            <a href="../index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <div style="text-align:center;">
                <h1 class="page-title">模型设置</h1>
                <p class="page-subtitle" style="margin-top:4px;">本项目自己的模型配置，不和其他项目共用</p>
            </div>
            <a href="chat.html" class="back-btn"><i class="fas fa-comment-dots"></i></a>
        </header>
        <main class="content-section settings-main">
            <div class="settings-shell">
                <section class="settings-hero">
                    <h2 style="font-size:28px;color:var(--ui-text);">默认就能直接用本地辅助解读。</h2>
                    <p>如果你想接入更强的远程模型，也可以在这里额外配置。配置保存在本项目自己的本地存储里，不会和其他项目互相读取。</p>
                    <div class="settings-toolbar"><button class="btn-inline primary" id="addApiBtn" type="button">添加远程模型</button></div>
                </section>
                <section id="builtinCard"></section>
                <section class="settings-grid" id="apiList"></section>
            </div>
        </main>
        <nav class="bottom-nav">
            <a href="../index.html" class="nav-item"><i class="fas fa-home"></i><span>首页</span></a>
            <a href="test.html" class="nav-item"><i class="fas fa-clipboard-list"></i><span>评估</span></a>
            <a href="chat.html" class="nav-item"><i class="fas fa-comment-dots"></i><span>AI解读</span></a>
            <a href="observe.html" class="nav-item"><i class="fas fa-eye"></i><span>观察</span></a>
            <a href="profile.html" class="nav-item"><i class="fas fa-folder-open"></i><span>档案</span></a>
        </nav>
    </div>

    <div class="modal-overlay" id="apiModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">添加远程模型</div>
                <button class="modal-close" id="closeModal" type="button"><i class="fas fa-times"></i></button>
            </div>
            <form id="apiForm">
                <div class="form-group"><label for="apiName">配置名称</label><input id="apiName" type="text" placeholder="例如：我的 GPT-4o"></div>
                <div class="form-group"><label for="apiProvider">提供商</label><select id="apiProvider"><option value="openai">OpenAI</option><option value="gemini">Gemini</option><option value="custom">OpenAI 兼容</option></select></div>
                <div class="form-group"><label for="apiBaseUrl">Base URL</label><input id="apiBaseUrl" type="text" placeholder="https://api.openai.com/v1"></div>
                <div class="form-group"><label for="apiKey">API Key</label><input id="apiKey" type="password" placeholder="输入密钥"></div>
                <div class="form-group"><label for="apiModel">模型名称</label><input id="apiModel" type="text" placeholder="gpt-4o-mini"></div>
                <div class="btn-row">
                    <button class="btn-inline" id="testApiBtn" type="button">测试连接</button>
                    <button class="btn-inline primary" type="submit">保存配置</button>
                </div>
                <div class="test-result" id="testResult"></div>
            </form>
        </div>
    </div>

    <script src="../dist/js/local-companion.js"></script>
    <script src="../dist/js/api-config.js"></script>
    <script src="../dist/js/page-api-settings.js"></script>
</body>
</html>
