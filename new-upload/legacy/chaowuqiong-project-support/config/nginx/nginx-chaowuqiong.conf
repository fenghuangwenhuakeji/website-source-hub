server {
    server_name fhwhkj.top www.fhwhkj.top 115.190.158.182;

    # 前端静态文件 - 主站
    location / {
        root /var/www/chaowuqiong/web;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 管理后台
    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        alias /var/www/chaowuqiong/admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # webuiapps
    location = /apps {
        return 301 /apps/;
    }

    location /apps/ {
        alias /var/www/chaowuqiong/apps/webuiapps/;
        index index.html;
        try_files $uri $uri/ /apps/index.html;
    }

    # API 请求 - 全部代理到 3000 端口 (chaowuqiong-api)
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 支付回调 - 也代理到 3000 端口
}
