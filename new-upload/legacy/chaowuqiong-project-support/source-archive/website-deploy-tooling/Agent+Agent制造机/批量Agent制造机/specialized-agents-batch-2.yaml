batch_name: "专业领域Agent生态系统 - 第二辑"
output_dir: ".trae/skills"
version: "1.0.0"
author: "AI Assistant"
description: "包含100个专业Agent，覆盖市场营销、心理咨询、旅游出行、美食烹饪、健身运动五大专业领域"

# ==========================================
# 第六类：市场营销类 Agent (20个)
# ==========================================
marketing_agents:
  category_name: "市场营销"
  description: "覆盖市场营销全流程的专业Agent"

  agents:
    - name: market-strategy-agent
      type: skill
      title: "市场战略专家"
      description: "制定市场战略，分析竞争格局，规划增长路径"
      core_concept: "战略引领，市场制胜"
      features:
        - "市场定位"
        - "竞争分析"
        - "增长策略"
        - "进入策略"
        - "品牌架构"
      priority: high
      tags: ["市场", "战略", "增长"]

    - name: brand-marketing-agent
      type: skill
      title: "品牌营销专家"
      description: "打造品牌形象，建立品牌认知，提升品牌价值"
      core_concept: "品牌是企业的灵魂"
      features:
        - "品牌定位"
        - "品牌故事"
        - "视觉识别"
        - "品牌传播"
        - "品牌管理"
      priority: high
      tags: ["品牌", "营销", "定位"]

    - name: digital-marketing-agent
      type: skill
      title: "数字营销专家"
      description: "提供全面的数字营销解决方案，整合线上线下渠道"
      core_concept: "数字化驱动营销增长"
      features:
        - "营销策略"
        - "渠道整合"
        - "数据分析"
        - "用户运营"
        - "效果优化"
      priority: high
      tags: ["数字", "营销", "增长"]

    - name: content-marketing-agent
      type: skill
      title: "内容营销专家"
      description: "策划和创作营销内容，吸引和转化目标客户"
      core_concept: "内容为王，价值驱动"
