        - "内容运营"
        - "粉丝互动"
        - "KOL合作"
        - "舆情管理"
      priority: high
      tags: ["社交", "媒体", "运营"]

    - name: seo-sem-agent
      type: skill
      title: "搜索营销专家"
      description: "优化搜索排名，管理搜索广告投放"
      core_concept: "搜索是流量的入口"
      features:
        - "SEO优化"
        - "SEM投放"
        - "关键词策略"
        - "着陆页优化"
        - "效果分析"
      priority: high
      tags: ["SEO", "SEM", "搜索"]

    - name: email-marketing-agent
      type: skill
      title: "邮件营销专家"
      description: "设计和执行邮件营销活动，提升转化率"
      core_concept: "精准触达，高效转化"
