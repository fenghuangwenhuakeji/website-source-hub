# ==========================================
# 元数据配置
# ==========================================
metadata:
  total_agents: 100
  categories:
    - name: "市场营销"
      count: 20
      color: "#e74c3c"
    - name: "心理咨询"
      count: 20
      color: "#9b59b6"
    - name: "旅游出行"
      count: 20
      color: "#3498db"
    - name: "美食烹饪"
      count: 20
      color: "#f39c12"
    - name: "健身运动"
      count: 20
      color: "#27ae60"
  
  generation_settings:
    parallel: true
    max_concurrent: 10
    retry_on_failure: true
    generate_index: true
    generate_readme: true
  
  quality_checks:
    - "文档完整性"
    - "命名规范性"
    - "内容质量"
    - "标签准确性"
    - "优先级合理性"
    - "免责声明完整性"

# ==========================================
# 生成后操作
# ==========================================
post_generation:
  actions:
    - type: "generate_index"
      filename: "AGENTS_INDEX.md"
      description: "生成Agent目录索引"
    
    - type: "generate_category_readme"
      description: "为每个类别生成README"
    
    - type: "validation_report"
      description: "生成验证报告"

# ==========================================
# 使用说明
# ==========================================
usage:
  command: "使用 batch-agent-creator skill 加载此配置文件"
  example: "根据 specialized-agents-batch-2.yaml 批量创建所有Agent"
  notes:
    - "本批次包含市场营销、心理咨询、旅游出行、美食烹饪、健身运动5个领域共100个Agent"
    - "心理咨询和健身类Agent已添加必要的免责声明"
    - "建议分领域逐步生成和测试"
