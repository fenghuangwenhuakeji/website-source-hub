      description: "分析消费者行为，挖掘需求，指导营销决策"
      core_concept: "洞察消费者，赢得市场"
      features:
        - "用户研究"
        - "需求分析"
        - "行为洞察"
        - "画像构建"
        - "趋势预测"
      priority: high
      tags: ["消费者", "洞察", "研究"]

    - name: competitive-analysis-agent
