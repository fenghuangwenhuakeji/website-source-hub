# ==========================================
# 第七类：心理咨询类 Agent (20个)
# ==========================================
psychology_counseling_agents:
  category_name: "心理咨询"
  description: "覆盖心理健康服务的专业Agent"
  disclaimer: "仅供参考，严重心理问题请寻求专业心理医生帮助"

  agents:
    - name: emotional-support-agent
      type: skill
      title: "情绪支持顾问"
      description: "提供情绪倾听和支持，帮助缓解负面情绪"
      core_concept: "倾听是最好的疗愈"
