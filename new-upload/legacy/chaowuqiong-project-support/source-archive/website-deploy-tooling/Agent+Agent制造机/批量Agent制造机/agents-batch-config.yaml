# ==========================================
# 50个Agent批量配置文件
# 分类：软件开发 | 小说创作 | AI写作
# 生成日期：2026-03-18
# ==========================================

batch_name: "Creative IDE Agent生态系统"
output_dir: ".trae/skills"
version: "1.0.0"
author: "AI Assistant"
description: "包含50个专业Agent的完整生态系统，覆盖软件开发、小说创作和AI写作三大领域"

# ==========================================
# 第一类：软件开发类 Agent (17个)
# ==========================================
software_development_agents:
  category_name: "软件开发"
  description: "覆盖软件全生命周期的专业开发Agent"
  
  agents:
    # 架构设计类
    - name: system-architect-agent
      type: skill
      title: "系统架构设计专家"
      description: "设计可扩展、高性能的系统架构，提供微服务、单体应用、事件驱动等多种架构方案"
      core_concept: "让每一个系统都有清晰的架构蓝图"
      features:
        - "架构模式选择（微服务/单体/分层）"
        - "技术栈选型建议"
        - "数据流设计"
        - "扩展性规划"
        - "架构文档生成"
      priority: high
      tags: ["架构", "系统设计", "技术选型"]

    - name: api-design-agent
      type: skill
      title: "API设计专家"
      description: "设计RESTful、GraphQL、gRPC等API，确保接口规范、易用、可维护"
      core_concept: "让API成为产品的最佳代言人"
      features:
        - "RESTful API设计"
        - "GraphQL Schema设计"
        - "API版本管理"
        - "接口文档生成"
        - "API安全设计"
      priority: high
      tags: ["API", "接口设计", "RESTful"]

    - name: database-design-agent
      type: skill
      title: "数据库设计专家"
      description: "设计关系型、NoSQL数据库结构，优化查询性能，确保数据一致性"
      core_concept: "数据是应用的核心，设计决定性能"
      features:
        - "数据库选型（SQL/NoSQL）"
        - "表结构设计"
        - "索引优化"
        - "数据建模"
        - "迁移脚本生成"
      priority: high
      tags: ["数据库", "SQL", "NoSQL", "数据建模"]

    # 代码质量类
    - name: code-review-agent
      type: skill
      title: "代码审查专家"
      description: "自动化代码审查，发现潜在问题，确保代码质量和最佳实践"
      core_concept: "好代码是审查出来的"
      features:
        - "代码规范检查"
        - "潜在Bug检测"
        - "性能问题识别"
        - "安全漏洞扫描"
        - "重构建议"
      priority: high
      tags: ["代码审查", "质量", "重构"]

    - name: refactoring-agent
      type: skill
      title: "代码重构专家"
      description: "识别代码坏味道，提供重构方案，改善代码结构和可维护性"
      core_concept: "让代码越变越优雅"
      features:
        - "坏味道识别"
        - "重构模式应用"
        - "设计模式引入"
        - "代码简化"
        - "测试保障"
      priority: medium
      tags: ["重构", "设计模式", "代码质量"]

    - name: testing-agent
      type: skill
      title: "测试策略专家"
      description: "制定全面的测试策略，包括单元测试、集成测试、E2E测试"
      core_concept: "没有测试的代码是不可信的"
      features:
        - "测试策略制定"
        - "单元测试编写"
        - "集成测试设计"
        - "测试覆盖率分析"
        - "自动化测试框架"
      priority: high
      tags: ["测试", "TDD", "自动化测试"]

    # DevOps类
    - name: cicd-agent
      type: skill
      title: "CI/CD流水线专家"
      description: "设计并实现持续集成、持续部署流水线，实现自动化构建和发布"
      core_concept: "自动化是一切效率的基础"
      features:
        - "CI/CD流程设计"
        - "GitHub Actions配置"
        - "Jenkins Pipeline"
        - "Docker镜像构建"
        - "自动化部署"
      priority: high
      tags: ["DevOps", "CI/CD", "自动化"]

    - name: docker-agent
      type: skill
      title: "容器化专家"
      description: "Docker容器化应用，编写Dockerfile，优化镜像大小和构建速度"
      core_concept: "一次构建，到处运行"
      features:
        - "Dockerfile编写"
        - "多阶段构建优化"
        - "Docker Compose配置"
        - "镜像安全扫描"
        - "容器编排"
      priority: medium
      tags: ["Docker", "容器化", "Kubernetes"]

    - name: monitoring-agent
      type: skill
      title: "监控告警专家"
      description: "建立应用监控体系，配置日志收集、性能监控、告警通知"
      core_concept: "可见性是运维的眼睛"
      features:
        - "监控指标设计"
        - "日志收集方案"
        - "告警规则配置"
        - "Dashboard搭建"
        - "链路追踪"
      priority: medium
      tags: ["监控", "日志", "可观测性"]

    # 安全类
    - name: security-agent
      type: skill
      title: "应用安全专家"
      description: "识别安全漏洞，提供安全加固方案，确保应用和数据安全"
      core_concept: "安全是设计出来的，不是补丁打出来的"
      features:
        - "安全漏洞扫描"
        - "认证授权设计"
        - "数据加密方案"
        - "安全编码规范"
        - "合规性检查"
      priority: high
      tags: ["安全", "漏洞", "加密"]

    # 性能优化类
    - name: performance-agent
      type: skill
      title: "性能优化专家"
      description: "分析性能瓶颈，提供优化方案，提升应用响应速度和吞吐量"
      core_concept: "性能是用户体验的基础"
      features:
        - "性能分析诊断"
        - "数据库查询优化"
        - "缓存策略设计"
        - "并发优化"
        - "前端性能优化"
      priority: high
      tags: ["性能", "优化", "缓存"]

    # 前端开发类
    - name: frontend-architect-agent
      type: skill
      title: "前端架构专家"
      description: "设计前端技术架构，选择框架，规划组件库和状态管理"
      core_concept: "前端也是工程，需要架构思维"
      features:
        - "前端框架选型"
        - "组件库设计"
        - "状态管理方案"
        - "构建工具配置"
        - "微前端架构"
      priority: medium
      tags: ["前端", "架构", "React", "Vue"]

    - name: ui-component-agent
      type: skill
      title: "UI组件开发专家"
      description: "开发可复用的UI组件，确保一致性、可访问性和响应式设计"
      core_concept: "好的组件像积木，灵活又稳固"
      features:
        - "组件设计规范"
        - "可访问性支持"
        - "主题定制"
        - "文档生成"
        - "单元测试"
      priority: medium
      tags: ["UI", "组件", "设计系统"]

    # 后端开发类
    - name: backend-service-agent
      type: skill
      title: "后端服务开发专家"
      description: "开发高性能后端服务，处理业务逻辑、数据访问和外部集成"
      core_concept: "稳定、高效、可维护的后端服务"
      features:
        - "服务层设计"
        - "业务逻辑实现"
        - "数据访问层"
        - "外部API集成"
        - "事务管理"
      priority: high
      tags: ["后端", "服务", "业务逻辑"]

    - name: message-queue-agent
      type: skill
      title: "消息队列专家"
      description: "设计和实现消息队列架构，处理异步任务、事件驱动和解耦"
      core_concept: "异步是扩展性的关键"
      features:
        - "消息队列选型"
        - "生产者消费者设计"
        - "消息可靠性保证"
        - "死信队列处理"
        - "事件溯源"
      priority: medium
      tags: ["消息队列", "异步", "事件驱动"]

    # 文档类
    - name: technical-writer-agent
      type: skill
      title: "技术文档专家"
      description: "编写清晰、完整的技术文档，包括API文档、架构文档、使用指南"
      core_concept: "好的文档是产品的门面"
      features:
        - "API文档编写"
        - "架构文档"
        - "开发指南"
        - "部署文档"
        - "代码注释规范"
      priority: medium
      tags: ["文档", "技术写作", "API文档"]

    - name: code-documentation-agent
      type: skill
      title: "代码文档化专家"
      description: "自动生成代码文档，提取注释，生成API参考和类型定义"
      core_concept: "代码即文档，文档即代码"
      features:
        - "自动化文档生成"
        - "类型定义文档"
        - "注释规范检查"
        - "示例代码生成"
        - "变更日志"
      priority: low
      tags: ["文档生成", "自动化", "注释"]

# ==========================================
# 第二类：小说创作类 Agent (17个)
# ==========================================
novel_writing_agents:
  category_name: "小说创作"
  description: "覆盖小说创作全流程的专业写作Agent"

  agents:
    # 创意构思类
    - name: story-idea-agent
      type: skill
      title: "故事创意生成专家"
      description: "生成原创故事创意，提供情节灵感、设定概念和主题方向"
      core_concept: "每一个好故事都始于一个闪光点"
      features:
        - "故事概念生成"
        - "情节灵感激发"
        - "主题深度挖掘"
        - "类型融合创新"
        - "市场趋势分析"
      priority: high
      tags: ["创意", "灵感", "故事概念"]

    - name: worldbuilding-agent
      type: skill
      title: "世界观构建专家"
      description: "构建完整的小说世界观，包括地理、历史、文化、魔法体系等"
      core_concept: "好的世界观让故事真实可信"
      features:
        - "地理环境设计"
        - "历史时间线"
        - "文化习俗构建"
        - "魔法/科技体系"
        - "种族与势力"
      priority: high
      tags: ["世界观", "设定", "幻想"]

    - name: character-design-agent
      type: skill
      title: "角色设计专家"
      description: "设计立体生动的角色，包括外貌、性格、背景、动机等"
      core_concept: "角色是故事的灵魂"
      features:
        - "角色档案创建"
        - "性格特征设计"
        - "背景故事编写"
        - "角色关系网"
        - "成长弧线规划"
      priority: high
      tags: ["角色", "人物", "性格"]

    # 结构设计类
    - name: plot-structure-agent
      type: skill
      title: "情节结构设计专家"
      description: "设计故事结构，规划起承转合，确保情节紧凑有张力"
      core_concept: "结构是故事的骨架"
      features:
        - "三幕式结构设计"
        - "情节点规划"
        - "冲突升级设计"
        - "伏笔与照应"
        - "高潮设计"
      priority: high
      tags: ["情节", "结构", "三幕式"]

    - name: outline-agent
      type: skill
      title: "大纲撰写专家"
      description: "撰写详细的故事大纲，包括章节划分、情节概要、节奏控制"
      core_concept: "好的大纲是成功的一半"
      features:
        - "章节大纲编写"
        - "情节概要撰写"
        - "节奏控制"
        - "多线叙事规划"
        - "大纲优化调整"
      priority: high
      tags: ["大纲", "章节", "规划"]

    - name: pacing-agent
      type: skill
      title: "节奏控制专家"
      description: "控制故事节奏，平衡紧张与舒缓，让读者欲罢不能"
      core_concept: "节奏是读者的呼吸"
      features:
        - "章节节奏设计"
        - "紧张感营造"
        - "过渡段落处理"
        - "高潮节奏控制"
        - "读者情绪曲线"
      priority: medium
      tags: ["节奏", "张力", "情绪"]

    # 写作执行类
    - name: scene-writing-agent
      type: skill
      title: "场景描写专家"
      description: "撰写生动的场景描写，营造氛围，推动情节发展"
      core_concept: "让读者身临其境"
      features:
        - "环境描写"
        - "动作描写"
        - "感官细节"
        - "氛围营造"
        - "场景转换"
      priority: high
      tags: ["场景", "描写", "氛围"]

    - name: dialogue-writing-agent
      type: skill
      title: "对话写作专家"
      description: "撰写自然生动的对话，展现角色性格，推动故事发展"
      core_concept: "对话是角色的声音"
      features:
        - "角色化对话"
        - "潜台词设计"
        - "对话节奏"
        - "方言与特色"
        - "对话标签使用"
      priority: high
      tags: ["对话", "台词", "交流"]

    - name: conflict-design-agent
      type: skill
      title: "冲突设计专家"
      description: "设计多层次冲突，包括人物冲突、内心冲突、环境冲突"
      core_concept: "冲突是故事的引擎"
      features:
        - "人物冲突设计"
        - "内心冲突刻画"
        - "环境冲突设置"
        - "冲突升级"
        - "冲突解决"
      priority: high
      tags: ["冲突", "矛盾", "张力"]

    # 类型小说类
    - name: romance-agent
      type: skill
      title: "言情小说专家"
      description: "创作言情小说，设计浪漫情节、情感发展和甜蜜互动"
      core_concept: "爱情是永恒的主题"
      features:
        - "浪漫情节设计"
        - "情感发展曲线"
        - "CP感营造"
        - "甜蜜互动"
        - "虐恋情深"
      priority: medium
      tags: ["言情", "爱情", "浪漫"]

    - name: fantasy-agent
      type: skill
      title: "奇幻小说专家"
      description: "创作奇幻小说，设计魔法系统、异世界、史诗冒险"
      core_concept: "在想象中创造无限可能"
      features:
        - "魔法体系设计"
        - "异世界构建"
        - "史诗冒险"
        - "神话传说"
        - "种族设定"
      priority: medium
      tags: ["奇幻", "魔法", "异世界"]

    - name: mystery-agent
      type: skill
      title: "悬疑推理专家"
      description: "创作悬疑推理小说，设计谜题、线索、反转和揭秘"
      core_concept: "让读者猜不到结局"
      features:
        - "谜题设计"
        - "线索布局"
        - "红鲱鱼误导"
        - "反转设计"
        - "逻辑推理"
      priority: medium
      tags: ["悬疑", "推理", "侦探"]

    - name: scifi-agent
      type: skill
      title: "科幻小说专家"
      description: "创作科幻小说，设计未来科技、太空探索、人工智能"
      core_concept: "科幻是未来的预言"
      features:
        - "科技设定"
        - "未来世界"
        - "太空歌剧"
        - "赛博朋克"
        - "硬科幻元素"
      priority: medium
      tags: ["科幻", "未来", "科技"]

    # 润色完善类
    - name: prose-polish-agent
      type: skill
      title: "文笔润色专家"
      description: "润色文字，提升文笔，让语言更加优美流畅"
      core_concept: "好文笔是改出来的"
      features:
        - "语言优化"
        - "修辞运用"
        - "句式调整"
        - "去AI化"
        - "风格统一"
      priority: high
      tags: ["润色", "文笔", "语言"]

    - name: continuity-check-agent
      type: skill
      title: "一致性检查专家"
      description: "检查故事前后一致性，避免bug和逻辑漏洞"
      core_concept: "细节决定成败"
      features:
        - "时间线检查"
        - "人物设定一致性"
        - "情节逻辑检查"
        - "伏笔回收检查"
        - "世界观一致性"
      priority: medium
      tags: ["一致性", "逻辑", "检查"]

    - name: emotional-impact-agent
      type: skill
      title: "情感冲击设计专家"
      description: "设计情感爆点，让读者产生强烈共鸣和情感体验"
      core_concept: "打动人心是写作的终极目标"
      features:
        - "泪点设计"
        - "燃点设计"
        - "情感铺垫"
        - "共鸣点设置"
        - "情绪高潮"
      priority: medium
      tags: ["情感", "共鸣", "泪点"]

    - name: opening-hook-agent
      type: skill
      title: "开篇钩子专家"
      description: "设计吸引人的开篇，抓住读者注意力，建立阅读期待"
      core_concept: "好的开始是成功的一半"
      features:
        - "开篇黄金三章"
        - "悬念设置"
        - "人物出场"
        - "世界观引入"
        - "阅读期待建立"
      priority: high
      tags: ["开篇", "钩子", "黄金三章"]

# ==========================================
# 第三类：AI写作类 Agent (16个)
# ==========================================
ai_writing_agents:
  category_name: "AI写作"
  description: "AI辅助写作的专业Agent，提升写作效率和质量"

  agents:
    # 提示工程类
    - name: prompt-engineer-agent
      type: skill
      title: "提示词工程专家"
      description: "编写高质量的AI提示词，优化输出质量，提高生成效率"
      core_concept: "好的提示词是AI写作的灵魂"
      features:
        - "提示词框架设计"
        - "角色设定提示"
        - "输出格式控制"
        - "Few-shot示例"
        - "提示词优化"
      priority: high
      tags: ["提示词", "Prompt", "AI生成"]

    - name: prompt-template-agent
      type: skill
      title: "提示词模板专家"
      description: "创建可复用的提示词模板，标准化AI写作流程"
      core_concept: "模板化是效率的基石"
      features:
        - "模板库建设"
        - "变量系统设计"
        - "场景模板"
        - "类型模板"
        - "模板优化"
      priority: medium
      tags: ["模板", "标准化", "复用"]

    # 内容生成类
    - name: content-expansion-agent
      type: skill
      title: "内容扩写专家"
      description: "将简短内容扩写成丰富详细的文本，增加细节和深度"
      core_concept: "从点到面，丰富内容"
      features:
        - "情节扩写"
        - "描写扩充"
        - "细节添加"
        - "背景补充"
        - "字数扩充"
      priority: high
      tags: ["扩写", "扩充", "细节"]

    - name: content-condense-agent
      type: skill
      title: "内容精简专家"
      description: "精简冗长内容，保留核心信息，提高信息密度"
      core_concept: "简洁是智慧的灵魂"
      features:
        - "摘要提取"
        - "冗余删除"
        - "要点提炼"
        - "精简改写"
        - "字数控制"
      priority: medium
