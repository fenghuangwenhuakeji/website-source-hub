    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- 刷新按钮 -->
    <button id="refresh-btn" title="刷新积分和时长">🔄</button>
    
    <!-- 用户信息显示 -->
    <div id="user-info">
      <div class="info-item">
        <span class="info-label">当前积分:</span>
        <span class="info-value" id="user-points">--</span>
      </div>
      <div class="info-item">
        <span class="info-label">会员到期:</span>
        <span class="info-value" id="user-expire">--</span>
      </div>
      <div class="info-item">
        <span class="info-label">状态:</span>
        <span class="info-value" id="user-status">--</span>
      </div>
    </div>
    
    <script>
      // 获取 token 的辅助函数
      function getToken() {
        // 尝试从 localStorage 获取
        const authStorage = localStorage.getItem('auth-storage');
        if (authStorage) {
          try {
            const parsed = JSON.parse(authStorage);
            if (parsed.state && parsed.state.token) {
              return parsed.state.token;
            }
          } catch (e) {}
        }
        // 尝试直接获取 token
        return localStorage.getItem('token') || sessionStorage.getItem('token');
      }
      
      // 刷新用户数据
      async function refreshUserData() {
        const btn = document.getElementById('refresh-btn');
        const userInfo = document.getElementById('user-info');
        
        btn.classList.add('spinning');
        
        try {
          const token = getToken();
          if (!token) {
            console.log('未找到 token，请先登录');
            btn.classList.remove('spinning');
            return;
          }
          
          // 获取用户信息
          const response = await fetch('/api/auth/profile', {
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            }
          });
          
          if (!response.ok) {
            throw new Error('获取用户信息失败');
          }
          
          const data = await response.json();
          
          if (data.success && data.data) {
            const user = data.data;
            
            // 更新显示
            document.getElementById('user-points').textContent = user.points || 0;
            
            if (user.membership_expire) {
              const expireDate = new Date(user.membership_expire);
              const now = new Date();
              const diff = expireDate - now;
              
              if (diff > 0) {
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                
                if (days > 0) {
                  document.getElementById('user-expire').textContent = `${days}天${hours}小时`;
                  document.getElementById('user-status').textContent = '✅ 会员有效';
                  document.getElementById('user-status').style.color = '#4ade80';
                } else {
                  document.getElementById('user-expire').textContent = `${hours}小时`;
                  document.getElementById('user-status').textContent = '✅ 会员有效';
                  document.getElementById('user-status').style.color = '#4ade80';
                }
              } else {
                document.getElementById('user-expire').textContent = '已过期';
                document.getElementById('user-status').textContent = '❌ 非会员';
                document.getElementById('user-status').style.color = '#ef4444';
              }
            } else {
              document.getElementById('user-expire').textContent = '无会员';
              document.getElementById('user-status').textContent = '❌ 非会员';
              document.getElementById('user-status').style.color = '#ef4444';
            }
            
            // 显示用户信息面板
            userInfo.classList.add('show');
            
            // 3秒后自动隐藏
            setTimeout(() => {
              userInfo.classList.remove('show');
            }, 5000);
            
            console.log('用户数据刷新成功:', user);
          }
        } catch (error) {
          console.error('刷新用户数据失败:', error);
          alert('刷新失败: ' + error.message);
        } finally {
          btn.classList.remove('spinning');
        }
      }
      
      // 绑定按钮点击事件
      document.getElementById('refresh-btn').addEventListener('click', refreshUserData);
      
      // 页面加载完成后自动刷新一次
      window.addEventListener('load', () => {
        setTimeout(refreshUserData, 2000);
      });
      
      // 每30秒自动刷新一次
      setInterval(refreshUserData, 30000);
    </script>
