server {
    listen 80;
    server_name 115.190.158.182 fhwhkj.top www.fhwhkj.top;

    # 前端网站
    root /var/www/chaowuqiong/frontend;
    index index.html;

    # API代理
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /payment/ {
        proxy_pass http://127.0.0.1:3000/payment/;
    }

    location ^~ /admin/assets/ {
        alias /var/www/chaowuqiong/apps/web-manage/dist/assets/;
    }

    location = /admin {
        return 301 /admin/;
    }

    location ^~ /admin/ {
        alias /var/www/chaowuqiong/apps/web-manage/dist/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
