                    <button class="sidebar-tab database-tab" data-target="emotion-panel"><i class="fas fa-chart-line"></i><span>情绪系统</span></button>

                    <button class="sidebar-tab" data-target="short-panel" data-iframe="丐版短篇/index.html"><i class="fas fa-pen-nib"></i><span>短篇写作</span></button>
                    <button class="sidebar-tab" data-target="card-engine-panel" data-iframe="卡牌引擎/index.html"><i class="fas fa-clone"></i><span>卡牌引擎</span></button>
                    <button class="sidebar-tab" data-target="v5-50-panel" data-iframe="5.50完全体/index.html"><i class="fas fa-star"></i><span>5.50完全体</span></button>
                    <button class="sidebar-tab" data-target="fourth-idea-panel" data-iframe="第四种融合思路/index.html"><i class="fas fa-lightbulb"></i><span>第四种融合</span></button>
                    <button class="sidebar-tab" data-target="gaiban-zhongchangpian-panel" data-iframe="丐版中长篇/index.html"><i class="fas fa-book-reader"></i><span>丐版中长篇</span></button>
                    <button class="sidebar-tab" data-target="xunhuan-xigang-panel" data-iframe="循环细纲版/index.html"><i class="fas fa-sync-alt"></i><span>循环细纲版</span></button>

                    <span id="current-page-title">创作流水线</span>

                    <span id="welcome-message">请先登录</span>
                    <button id="login-btn" class="settings-btn">登录</button>

                    <button id="logout-btn" class="settings-btn hidden">登出</button>
                    <button id="project-manager-btn" class="settings-btn" title="项目管理"><i class="fas fa-folder-open"></i></button>
                    <button id="toggle-database-btn" class="settings-btn" title="隐藏资料库"><i class="fas fa-database"></i></button>

            <main class="main-content" id="main-content">
                <div id="pipeline-panel" class="tab-content active"></div>

                <div id="fourth-idea-panel" class="tab-content iframe-panel" data-src="第四种融合思路/index.html"></div>
                <div id="gaiban-zhongchangpian-panel" class="tab-content iframe-panel" data-src="丐版中长篇/index.html"></div>

            </main>

    <div id="notification-container"></div>
    
    <!-- API 设置模态框 -->
    <div id="api-modal" class="modal-overlay hidden" style="z-index: 3000;">
        <div class="modal-content" style="width: 480px; max-width: 90vw; max-height: 90vh; overflow-y: auto; position: relative;">
            <div style="position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(to right, #3b82f6, #8b5cf6, #ec4899);"></div>
            <div class="modal-header" style="border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 15px;">
                <h3 style="color: var(--text-color); font-size: 1rem; font-weight: bold;" id="api-modal-title">API 配置</h3>
                <button class="close-btn" style="background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer;" onclick="document.getElementById('api-modal').classList.add('hidden')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <div style="padding: 12px; border-radius: 8px; border: 2px solid rgba(99, 102, 241, 0.3); background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%);">
                    <div style="display: flex; align-items: flex-start; gap: 8px;">
                        <i class="fa-solid fa-circle-info" style="color: #6366f1; margin-top: 2px;"></i>
                        <div style="font-size: 12px; line-height: 1.5; color: var(--text-color); font-weight: 600;">
                            <strong>快速开始：</strong>选择服务商后，系统将自动填充默认 API 地址。输入 API Key 后点击"获取模型列表"按钮，即可看到该服务商下所有可用模型。
                        </div>
                    </div>
                </div>
                <div style="display: flex; flex-direction: column; gap: 4px;">
                    <span style="font-size: 12px; font-weight: bold; color: var(--text-color); display: flex; align-items: center; gap: 8px;">
                        <i class="fa-solid fa-tag" style="color: #6366f1;"></i>
                        配置名称
                    </span>
                    <input id="api-name" style="border-radius: 8px; height: 36px; font-size: 14px; padding: 0 12px; background: var(--bg-color); border: 2px solid var(--border-color); color: var(--text-color); width: 100%;" placeholder="例如：GPT-4o 生产环境">
                </div>
                <div style="display: flex; flex-direction: column; gap: 4px;">
                    <span style="font-size: 12px; font-weight: bold; color: var(--text-color); display: flex; align-items: center; gap: 8px;">
                        <i class="fa-solid fa-sliders" style="color: #6366f1;"></i>
                        服务商
                    </span>
                    <select id="api-provider" style="height: 36px; padding: 0 12px; font-size: 14px; font-weight: bold; border-radius: 8px; background: var(--bg-color); border: 2px solid var(--border-color); color: var(--text-color); min-width: 200px;" onchange="onApiProviderChange()">
                        <option value="zhipu">🧠 智谱清言 (Zhipu AI)</option>
                        <option value="volcark">🌋 火山方舟 (VolcArk)</option>
                        <option value="volcano_coding">💻 火山Coding Plan</option>
                        <option value="kimi">🌙 月之暗面 (Kimi)</option>
                        <option value="minimax">🤖 MiniMax</option>
                        <option value="deepseek">🔍 深度求索 (DeepSeek)</option>
                        <option value="baichuan">📚 百川智能</option>
                        <option value="stepfun">🚀 阶跃星辰</option>
                        <option value="openai">🟢 OpenAI</option>
                        <option value="azure">💠 Azure OpenAI</option>
                        <option value="openai_compat">🔗 OpenAI 兼容 (自定义)</option>
                    </select>
                </div>
                <div id="api-url-group" style="display: none; flex-direction: column; gap: 4px;">
                    <span style="font-size: 12px; font-weight: bold; color: var(--text-color); display: flex; align-items: center; gap: 8px;">
                        <i class="fa-solid fa-link" style="color: #6366f1;"></i>
                        API 地址 (Base URL)
                    </span>
                    <input id="api-url" style="border-radius: 8px; height: 36px; font-size: 14px; padding: 0 12px; font-family: monospace; background: var(--bg-color); border: 2px solid var(--border-color); color: var(--text-color); width: 100%;" placeholder="https://api.openai.com/v1">
                </div>
                <div style="display: flex; flex-direction: column; gap: 4px;">
                    <span style="font-size: 12px; font-weight: bold; color: var(--text-color); display: flex; align-items: center; gap: 8px;">
                        <i class="fa-solid fa-key" style="color: #6366f1;"></i>
                        API 密钥
                    </span>
                    <input id="api-key" style="border-radius: 8px; height: 36px; font-size: 14px; padding: 0 12px; font-family: monospace; background: var(--bg-color); border: 2px solid var(--border-color); color: var(--text-color); width: 100%;" type="password" placeholder="sk-...">
                </div>
                <div style="display: flex; flex-direction: column; gap: 4px;">
                    <span style="font-size: 12px; font-weight: bold; color: var(--text-color); display: flex; align-items: center; gap: 8px;">
                        <i class="fa-solid fa-box" style="color: #6366f1;"></i>
                        模型选择
                    </span>
                    <div style="display: flex; gap: 8px;">
                        <select id="api-model-select" style="flex: 1; border-radius: 8px; height: 36px; font-size: 14px; font-weight: bold; padding: 0 12px; background: var(--bg-color); border: 2px solid var(--border-color); color: var(--text-color);">
                            <option value="">- 请先获取模型列表 -</option>
                        </select>
                        <button style="padding: 0 12px; border-radius: 8px; color: white; border: none; background: #6366f1; cursor: pointer;" onclick="fetchApiModels()" title="获取可用模型列表">
                            <i class="fa-solid fa-rotate"></i>
                        </button>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px; margin-top: 4px;">
                        <span style="font-size: 10px; white-space: nowrap; color: var(--text-muted);">或自定义模型:</span>
                        <input id="api-model-custom" style="flex: 1; border-radius: 8px; height: 28px; font-size: 12px; padding: 0 8px; font-family: monospace; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-color);" placeholder="输入自定义模型名称" oninput="onCustomModelInput()">
                    </div>
                    <input id="api-model" type="hidden" value="">
                </div>
                <input id="api-temp" type="hidden" value="">
                <input id="api-tokens" type="hidden" value="">
            </div>
            <div class="modal-footer" style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border-color);">
                <button style="padding: 10px 24px; border-radius: 8px; color: white; border: none; background: #6b7280; cursor: pointer;" onclick="document.getElementById('api-modal').classList.add('hidden')">取消</button>
                <button style="padding: 10px 24px; border-radius: 8px; color: white; border: none; font-weight: bold; background: #6366f1; cursor: pointer;" onclick="saveApiConfig()">保存配置</button>
            </div>
        </div>
    </div>
    <div id="project-manager-modal" class="modal-overlay hidden">
        <div class="modal-content large">
            <div class="modal-header"><h2><i class="fas fa-folder-open"></i> 项目管理中心</h2><button class="close-btn">&times;</button></div>
            <div class="modal-body"><div id="project-list-container"></div></div>
            <div class="modal-footer"><span id="project-status-message"></span><button id="save-current-project-btn" class="action-btn"><i class="fas fa-save"></i> 保存当前工作</button><button id="save-as-new-project-btn" class="settings-btn"><i class="fas fa-plus"></i> 另存为新项目</button></div>
        </div>
    </div>
    <div id="character-editor-modal" class="modal-overlay hidden"></div>
    <div id="save-as-new-project-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header"><h2><i class="fas fa-plus"></i> 另存为新项目</h2><button class="close-btn">&times;</button></div>
            <div class="modal-body"><div class="form-group"><label for="new-project-name-input">请输入新项目的名称:</label><input type="text" id="new-project-name-input" placeholder="例如：我的史诗级作品"></div></div>
            <div class="modal-footer"><button class="settings-btn close-btn">取消</button><button id="confirm-save-as-new-btn" class="action-btn">确认保存</button></div>
        </div>
    </div>
    <div id="rename-project-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header"><h2><i class="fas fa-edit"></i> 重命名项目</h2><button class="close-btn">&times;</button></div>
            <div class="modal-body"><div class="form-group"><label for="rename-project-name-input">请输入新的项目名称:</label><input type="text" id="rename-project-name-input"></div></div>
            <div class="modal-footer"><button class="settings-btn close-btn">取消</button><button id="confirm-rename-btn" class="action-btn">确认重命名</button></div>
        </div>
    </div>
    <div id="delete-project-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header"><h2><i class="fas fa-trash-alt"></i> 删除项目确认</h2><button class="close-btn">&times;</button></div>
            <div class="modal-body"><p>您确定要永久删除项目 "<strong id="delete-project-name-display"></strong>" 吗？此操作无法撤销。</p></div>
            <div class="modal-footer"><button class="settings-btn close-btn">取消</button><button id="confirm-delete-btn" class="action-btn" style="background-color: var(--error-color);">确认删除</button></div>
        </div>
    </div>
    <div id="overwrite-project-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header"><h2><i class="fas fa-save"></i> 保存项目确认</h2><button class="close-btn">&times;</button></div>
            <div class="modal-body"><p>项目 "<strong id="overwrite-project-name-display"></strong>" 已存在。您确定要覆盖它吗？</p></div>
            <div class="modal-footer"><button class="settings-btn close-btn">取消</button><button id="confirm-overwrite-btn" class="action-btn">确认覆盖</button></div>
        </div>
    </div>
    
    <!-- 核心依赖 -->
    <script src="js/core/01_状态管理.js"></script>
    <script src="js/core/02_通用工具.js"></script>
    <script src="js/core/03_API接口.js"></script>
    <script src="js/core/04_用户认证.js"></script>
    <script src="js/core/05_database.js"></script>
    <script src="js/core/06_vector_database.js"></script>
    
    <!-- 新增智能辅助模块 -->
    <script src="js/core/rag.js"></script>
    <script src="js/core/memory.js"></script>
    <script src="js/core/library.js"></script>
    
    <!-- 数据文件 -->
    <script src="js/data/叙事圣典数据.js"></script>
    <script src="js/data/角色系统数据.js"></script>
    <script src="js/data/角色原型数据.js"></script>
    <script src="js/data/情节系统数据.js"></script>
    <script src="js/data/情绪系统数据.js"></script>
    <script src="js/data/世界观数据.js"></script>
    <script src="js/data/伏笔数据.js"></script>
    <script src="js/data/地图数据.js"></script>
    <script src="js/data/prompts.js"></script>
    
    <!-- UI 模块 -->
    <script src="js/modules/project_manager.js"></script>
    <script src="js/character-manager.js"></script>

    <!-- 数据库面板 -->
    <script src="js/database_panels/叙事圣典面板.js"></script>
    <script src="js/database_panels/角色系统面板.js"></script>
    <script src="js/database_panels/角色原型面板.js"></script>
    <script src="js/database_panels/情节系统面板.js"></script>
    <script src="js/database_panels/情绪系统面板.js"></script>
    <script src="js/database_panels/向量库面板.js"></script>
    
    <!-- 新版功能模块 -->
    <script src="js/modules/pipeline.js"></script>
    <script src="js/modules/02_大纲写作.js"></script>
    <script src="js/modules/03_长篇写作.js"></script>
    <script src="js/modules/module-writing-desk.js"></script>
    
    <!-- 主入口 -->
    <script src="js/main.js"></script>
</body>
</html>
