function getPreviousSpineCode() {
  const currentIndex = APP_STATE.currentChapterIndex;
  if (currentIndex <= 0) return null;
  
  for (let i = currentIndex - 1; i >= 0; i--) {
    const prevChapter = APP_STATE.chapters[i];
    if (prevChapter && APP_STATE.globalMemory.spineCodes[prevChapter.id]) {
      return APP_STATE.globalMemory.spineCodes[prevChapter.id];
    }
  }
  return null;
}

function extractSpineCode(content) {
  const spineMatch = content.match(/@\[SPINE:([^\]]+)\]\s*([^\n]+)/);
  if (spineMatch) {
    const spineCode = `@[SPINE:${spineMatch[1]}] ${spineMatch[2]}`;
    const cleanContent = content.replace(/@\[SPINE:[^\]]+\]\s*[^\n]+\n?/, '').trim();
    return { content: cleanContent, spineCode };
  }
  return { content, spineCode: null };
}

function detectAIWriting(content) {
  const warnings = [];
  
  const aiPatterns = [
    { pattern: /随着[^。]+的发展[，。]/g, message: '发现"随着...的发展"开头' },
    { pattern: /在当今社会[，。]/g, message: '发现"在当今社会"开头' },
    { pattern: /近年来[，。]/g, message: '发现"近年来"开头' },
    { pattern: /综上所述[，。：]/g, message: '发现"综上所述"过渡' },
    { pattern: /总而言之[，。：]/g, message: '发现"总而言之"过渡' },
    { pattern: /由此可见[，。：]/g, message: '发现"由此可见"过渡' },
    { pattern: /具有重要的理论意义和实践价值/g, message: '发现空泛的意义表述' },
    { pattern: /填补了[^。]+空白/g, message: '发现"填补空白"空话' },
    { pattern: /首先[，。].*?其次[，。].*?最后[，。]/gs, message: '发现机械的"首先其次最后"结构' }
  ];
  
  for (const { pattern, message } of aiPatterns) {
    if (pattern.test(content)) {
      warnings.push(message);
    }
  }
  
  return warnings;
}

    APP_STATE.chatHistory.push({ role: 'assistant', content: result });
    renderChapterList();
    renderCurrentChapterContent();
    addChatMessage('system', '✅ 去AI化优化完成！请审阅修改后的内容。');
    saveProjectToLocal();
  }
}

async function rewriteSelection() {
  const selection = window.getSelection();
  const selectedText = selection.toString().trim();
  
  if (!selectedText) {
    showToast('请先在编辑器中选中需要重构的文本', 'error');
    return;
  }

  if (APP_STATE.currentChapterIndex < 0) {
    showToast('请先选择一个章节', 'error');
    return;
  }

  const ch = APP_STATE.chapters[APP_STATE.currentChapterIndex];
  if (!ch.content) {
    showToast('该章节尚未撰写', 'error');
    return;
  }

  const fullContent = ch.content;
  const selectionIndex = fullContent.indexOf(selectedText);
  
  if (selectionIndex === -1) {
    showToast('无法在章节中找到选中的文本', 'error');
    return;
  }

  const contextBefore = fullContent.substring(Math.max(0, selectionIndex - 500), selectionIndex);
  const contextAfter = fullContent.substring(selectionIndex + selectedText.length, Math.min(fullContent.length, selectionIndex + selectedText.length + 500));

  const userIntent = prompt('请描述您希望如何重构这段内容：\n\n例如：\n- 使论证更加严谨\n- 增加数据支撑\n- 调整语言风格\n- 补充理论依据');
  
  if (!userIntent) {
    showToast('已取消重构', 'info');
    return;
  }

  addChatMessage('system', `正在重构选中内容...\n\n【选中内容】${selectedText.substring(0, 100)}${selectedText.length > 100 ? '...' : ''}\n\n【重构意图】${userIntent}`);

  const systemPrompt = buildSystemPrompt();
  const rewritePrompt = `请根据用户意图重构以下选中的文本内容。

【上下文（前文）】
${contextBefore || '（无前文）'}

【选中内容（需要重构）】
${selectedText}

【上下文（后文）】
${contextAfter || '（无后文）'}

【用户重构意图】
${userIntent}

【重构要求】
1. 保持与上下文的逻辑连贯性
2. 遵循"去AI化书写规范"
3. 保持学术严谨性
4. 输出重构后的完整内容（仅输出重构后的选中内容部分，不要输出上下文）

【输出格式】
直接输出重构后的内容，不需要额外说明。`;

  const messages = [
    { role: 'system', content: systemPrompt },
    { role: 'user', content: rewritePrompt }
  ];

  APP_STATE.isGenerating = true;
  document.getElementById('apiStatusDot').className = 'status-dot working';
  addStreamingMessage();

  const result = await callAPI(messages, (chunk, full) => {
    updateStreamingMessage(full);
  });

  finalizeStreamingMessage();
  APP_STATE.isGenerating = false;
  document.getElementById('apiStatusDot').className = 'status-dot connected';

  if (result) {
    const newContent = fullContent.substring(0, selectionIndex) + result + fullContent.substring(selectionIndex + selectedText.length);
    ch.content = newContent;
    ch.wordCount = countWords(newContent);
    ch.status = 'review';
    ch.aiWarningShown = false;
    APP_STATE.chatHistory.push({ role: 'assistant', content: result });
    renderChapterList();
    renderCurrentChapterContent();
    addChatMessage('system', '✅ 内容重构完成！请审阅修改后的内容。');
    saveProjectToLocal();
  }
}

function buildMemoryContext() {
  const mem = APP_STATE.globalMemory;
  let ctx = '【全局记忆库】\n';
  if (mem.researchQuestions.length) ctx += `研究问题: ${mem.researchQuestions.join('; ')}\n`;
  if (mem.coreHypotheses.length) ctx += `核心假设: ${mem.coreHypotheses.join('; ')}\n`;
  if (mem.frameworkDetails.length) ctx += `理论框架: ${mem.frameworkDetails.join('; ')}\n`;
  if (mem.keyData.length) ctx += `关键数据: ${mem.keyData.join('; ')}\n`;
  if (mem.literaturePositions.length) ctx += `文献立场: ${mem.literaturePositions.join('; ')}\n`;
  if (mem.completedChapterSummaries.length) ctx += `已完成章节: ${mem.completedChapterSummaries.length}章\n`;
  return ctx;
}

async function reviseCurrentChapter() {
  if (APP_STATE.currentChapterIndex < 0) {
    showToast('请先选择一个章节', 'error');
    return;
  }

  const ch = APP_STATE.chapters[APP_STATE.currentChapterIndex];
  if (!ch.content) {
    showToast('该章节尚未撰写', 'error');
    return;
  }

  const instruction = prompt('请输入修改要求：');
  if (!instruction) return;

  addChatMessage('user', `请修改"${ch.title}"章节，修改要求：${instruction}`);

  const systemPrompt = buildSystemPrompt();
  const messages = [
    { role: 'system', content: systemPrompt },
    { role: 'user', content: `以下是"${ch.title}"的当前内容：\n\n${ch.content}` },
    { role: 'assistant', content: '已记录当前章节内容。' },
    { role: 'user', content: `请根据以下要求修改上述章节，输出完整修改后的章节内容：\n${instruction}` }
  ];

  APP_STATE.isGenerating = true;
  document.getElementById('apiStatusDot').className = 'status-dot working';
  addStreamingMessage();

  const result = await callAPI(messages, (chunk, full) => {
    updateStreamingMessage(full);
    ch.content = full;
    ch.wordCount = countWords(full);
    if (APP_STATE.currentEditorTab === 'content') {
      renderCurrentChapterContent();
    }
  });

  finalizeStreamingMessage();
  APP_STATE.isGenerating = false;
  document.getElementById('apiStatusDot').className = 'status-dot connected';

  if (result) {
    ch.content = result;
    ch.wordCount = countWords(result);
    ch.status = 'review';
    APP_STATE.chatHistory.push({ role: 'assistant', content: result });
    renderChapterList();
    renderCurrentChapterContent();
    addChatMessage('system', `"${ch.title}"已修改完成，请审阅。`);
    saveProjectToLocal();
  }
}

async function quickAction(action) {
  switch (action) {
    case 'auto_write_all':
      await autoWriteFullPaper();
      break;
    case 'generate_outline':
      await startOutlineGeneration();
      break;
    case 'write_chapter':
      await startChapterGeneration();
      break;
    case 'revise_chapter':
      await reviseCurrentChapter();
      break;
    case 'expand_section':
      const input = document.getElementById('chatInput');
      input.value = '请扩写当前章节中内容较为简略的部分，保持学术风格和全局一致性';
      input.focus();
      break;
    case 'check_consistency':
      if (!APP_STATE.project) { showToast('请先创建项目', 'error'); return; }
      addChatMessage('user', '请进行全局一致性检查，检查所有已完成章节之间是否存在矛盾或不一致之处。');
      await sendChatMessage();
      break;
    case 'compile_all':
      await compileFullPaper();
      break;
    case 'optimize_ai':
      await optimizeAIWriting();
      break;
    case 'continue_writing':
      await continueWriting();
      break;
    case 'polish_content':
      await polishContent();
      break;
    case 'logic_check':
      await logicCheck();
      break;
    case 'optimize_current':
      await optimizeCurrentChapter();
      break;
    case 'rewrite_selection':
      await rewriteSelection();
      break;
  }
}

async function autoWriteFullPaper() {
  if (!APP_STATE.project) {
    showToast('请先创建论文项目', 'error');
    openModal('projectSettings');
    return;
  }

  if (!APP_STATE.apiConfig.apiKey) {
    showToast('请先配置 API', 'error');
    openModal('apiSettings');
    return;
  }

  const confirmed = confirm('一键生成论文将自动完成以下步骤：\n\n1. 生成论文大纲\n2. 逐章撰写内容\n3. 整合全文\n\n此过程可能需要较长时间，确定继续吗？');
  if (!confirmed) return;

  addChatMessage('system', '🚀 开始一键生成论文...');

  // Step 1: 生成大纲
  addChatMessage('system', '📝 第一步：生成论文大纲...');
  await startOutlineGeneration();
  
  // 等待用户确认大纲
  const outlineConfirmed = confirm('大纲已生成！请查看并确认大纲内容。\n\n确认后将继续逐章撰写，或取消后手动调整大纲。');
  if (!outlineConfirmed) {
    addChatMessage('system', '⏸ 已暂停，您可以手动调整大纲后继续撰写。');
    return;
  }

  // Step 2: 逐章撰写
  const chaptersToWrite = APP_STATE.chapters.filter(ch => 
    ch.id !== 'title' && ch.id !== 'abstract_cn' && ch.id !== 'abstract_en' && 
    ch.id !== 'toc' && ch.id !== 'references' && ch.id !== 'appendix' && 
    ch.id !== 'acknowledgement' && ch.id !== 'declaration'
  );

  addChatMessage('system', `✍️ 第二步：开始撰写 ${chaptersToWrite.length} 个章节...`);

  for (let i = 0; i < chaptersToWrite.length; i++) {
    const ch = chaptersToWrite[i];
    const chapterIndex = APP_STATE.chapters.findIndex(c => c.id === ch.id);
    
    addChatMessage('system', `正在撰写：${ch.title}（${i + 1}/${chaptersToWrite.length}）`);
    
    selectChapter(chapterIndex);
    await startChapterGeneration();
    
    // 短暂延迟，避免 API 限流
    if (i < chaptersToWrite.length - 1) {
      await new Promise(resolve => setTimeout(resolve, 2000));
    }
  }

  // Step 3: 整合全文
  addChatMessage('system', '📚 第三步：整合全文...');
  await compileFullPaper();

  addChatMessage('system', '🎉 论文生成完成！您可以导出或继续修改。');
  showToast('🎉 论文一键生成完成！', 'success');
}

async function compileFullPaper() {
  const incompleteChapters = APP_STATE.chapters.filter(c => !c.content && c.id !== 'toc');
  if (incompleteChapters.length > 0) {
    showToast(`还有 ${incompleteChapters.length} 个章节未完成`, 'warning');
  }

  const content = getFullPaperText();
  if (!content) {
    showToast('论文内容为空', 'error');
    return;
  }

  addChatMessage('system', '正在整合全文...');

  const systemPrompt = buildSystemPrompt();
  const messages = [
    { role: 'system', content: systemPrompt },
    { role: 'user', content: `以下是论文全文内容，请进行最终审校：\n\n${content}\n\n请检查：1.全局一致性 2.章节衔接 3.格式规范 4.语言风格统一性。输出审校意见和修改建议。` }
  ];

  APP_STATE.isGenerating = true;
  document.getElementById('apiStatusDot').className = 'status-dot working';
  addStreamingMessage();

  const result = await callAPI(messages, (chunk, full) => {
    updateStreamingMessage(full);
  });

  finalizeStreamingMessage();
  APP_STATE.isGenerating = false;
  document.getElementById('apiStatusDot').className = 'status-dot connected';

  if (result) {
    APP_STATE.chatHistory.push({ role: 'assistant', content: result });
    addChatMessage('system', '全文审校完成！请查看AI的审校意见。确认无误后可导出论文。');
  }
}

function clearChat() {
  if (!confirm('确定清空所有对话记录？')) return;
  APP_STATE.chatHistory = [];
  APP_STATE.debugMessages = [];
  document.getElementById('chatMessages').innerHTML = '';
  addChatMessage('system', '对话已清空。你可以继续与AI对话进行论文写作。');
  saveProjectToLocal();
}

function saveProjectToLocal() {
  const data = {
    project: APP_STATE.project,
    chapters: APP_STATE.chapters,
    currentChapterIndex: APP_STATE.currentChapterIndex,
    outlineLocked: APP_STATE.outlineLocked,
    globalMemory: APP_STATE.globalMemory,
    chatHistory: APP_STATE.chatHistory.slice(-50),
    debugMessages: APP_STATE.debugMessages.slice(-20),
    totalTokens: APP_STATE.totalTokens
  };
  safeSetItem('academiWriteProject', JSON.stringify(data));
}

function loadProjectFromLocal() {
  const saved = safeGetItem('academiWriteProject');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      if (data.project) APP_STATE.project = data.project;
      if (data.chapters) APP_STATE.chapters = data.chapters;
      if (typeof data.currentChapterIndex === 'number') APP_STATE.currentChapterIndex = data.currentChapterIndex;
      if (typeof data.outlineLocked === 'boolean') APP_STATE.outlineLocked = data.outlineLocked;
      if (data.globalMemory) APP_STATE.globalMemory = data.globalMemory;
      if (data.chatHistory) APP_STATE.chatHistory = data.chatHistory;
      if (data.debugMessages) APP_STATE.debugMessages = data.debugMessages;
      if (data.totalTokens) APP_STATE.totalTokens = data.totalTokens;

      if (APP_STATE.project) {
        document.getElementById('projectName').textContent = APP_STATE.project.title;
      }
      renderChapterList();
      updateMemorySummary();
      updateProgress();
      updateTokenDisplay();
      
      if (APP_STATE.chatHistory && APP_STATE.chatHistory.length > 0) {
        const chatMessages = document.getElementById('chatMessages');
        chatMessages.innerHTML = '';
        
        if (APP_STATE.debugMessages && APP_STATE.debugMessages.length > 0) {
          const debugContainer = document.getElementById('debugMessagesContainer');
          debugContainer.innerHTML = '';
          APP_STATE.debugMessages.forEach(msg => {
            const div = document.createElement('div');
            let roleDisplay = '🔧 调试';
            let roleClass = 'debug';
            if (msg.role === 'debug-send') {
              roleDisplay = '📤 发送内容';
              roleClass = 'debug debug-send';
            } else if (msg.role === 'debug-receive') {
              roleDisplay = '📥 返回内容';
              roleClass = 'debug debug-receive';
            }
            const msgId = 'debug_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            const lineCount = msg.content.split('\n').length;
            div.id = msgId;
            div.className = `chat-msg ${roleClass}`;
            div.innerHTML = `
              <div class="msg-header" onclick="toggleDebugMessage('${msgId}')">
                <span class="msg-role">${roleDisplay} (${lineCount}行)</span>
                <span class="toggle-icon">▼</span>
              </div>
              <div class="msg-content">${escapeHtml(msg.content)}</div>
            `;
            if (msg.role === 'debug-send' && !showDebugSend) {
              div.style.display = 'none';
            }
            if (msg.role === 'debug-receive' && !showDebugReceive) {
              div.style.display = 'none';
            }
            debugContainer.appendChild(div);
          });
        }
        
        APP_STATE.chatHistory.forEach(msg => {
          const div = document.createElement('div');
          div.className = `chat-msg ${msg.role}`;
          div.innerHTML = `<div class="msg-role">${msg.role === 'user' ? '你' : msg.role === 'assistant' ? 'AI' : '系统'}</div><div class="msg-content">${escapeHtml(msg.content)}</div>`;
          chatMessages.appendChild(div);
        });
        
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }
      
      if (APP_STATE.chapters.length > 0) {
        const idxToSelect = APP_STATE.currentChapterIndex >= 0 && APP_STATE.currentChapterIndex < APP_STATE.chapters.length 
          ? APP_STATE.currentChapterIndex 
          : 0;
        selectChapter(idxToSelect);
      }
    } catch (e) {
      console.error('加载项目失败:', e);
    }
  }

  const currentConfigId = localStorage.getItem('currentAPIConfigId');
  if (currentConfigId) {
    const savedConfigs = getSavedAPIConfigs();
    const config = savedConfigs.find(c => c.id === currentConfigId);
    if (config) {
      APP_STATE.apiConfig.apiKey = config.apiKey;
      APP_STATE.apiConfig.model = config.model;
      APP_STATE.apiConfig.baseUrl = config.baseUrl;
      console.log('已加载保存的API配置:', config.name);
    }
  }
  
  const apiSaved = safeGetItem('apiConfig');
  if (apiSaved && !APP_STATE.apiConfig.apiKey) {
    try {
      const apiData = JSON.parse(apiSaved);
      if (apiData.apiKey) APP_STATE.apiConfig.apiKey = apiData.apiKey;
      if (apiData.model) APP_STATE.apiConfig.model = apiData.model;
      if (apiData.baseUrl) APP_STATE.apiConfig.baseUrl = apiData.baseUrl;
      console.log('API配置已加载:', {
        hasKey: !!APP_STATE.apiConfig.apiKey,
        model: APP_STATE.apiConfig.model,
        baseUrl: APP_STATE.apiConfig.baseUrl
      });
    } catch (e) {
      console.error('加载API配置失败:', e);
    }
  }
  updateAPIStatus();
  
  APP_STATE.deepThinkingEnabled = localStorage.getItem('deepThinkingEnabled') === 'true';
  if (APP_STATE.deepThinkingEnabled) {
    console.log('🧠 深度思考模式已恢复');
  }

  const theme = safeGetItem('theme');
  if (theme) {
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('themeBtn').textContent = theme === 'light' ? '☀' : '🌙';
  }
}

function init() {
  loadProjectFromLocal();
  updateAPIStatus();
  initDebugButtons();

  document.getElementById('chatInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  const chatMessages = document.getElementById('chatMessages');
  chatMessages.addEventListener('scroll', function() {
    const isAtBottom = chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight < 50;
    APP_STATE.userScrolled = !isAtBottom;
  });

  setInterval(saveProjectToLocal, 30000);
}

init();
</script>
