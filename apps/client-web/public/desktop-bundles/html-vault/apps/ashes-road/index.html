<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灰烬之路 - 文字互动</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-dark: #0d1117;
  --bg-card: #161b22;
  --bg-input: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --accent: #f0883e;
  --accent-light: #ffa657;
  --success: #3fb950;
  --danger: #f85149;
  --step-active: #388bfd;
  --purple: #a371f7;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-dark);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}
.header {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
.header-actions { display: flex; gap: 0.75rem; }
.btn {
  padding: 0.5rem 1rem;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text);
  cursor: pointer;
  font-size: 0.875rem;
  transition: all 0.2s;
}
.btn:hover { background: var(--border); }
.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
  font-weight: 600;
}
.btn-primary:hover { background: var(--accent-light); }
.main-container {
  display: flex;
  min-height: calc(100vh - 60px);
}
.sidebar {
  width: 280px;
  background: var(--bg-card);
  border-right: 1px solid var(--border);
  padding: 1.5rem;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  overflow-y: auto;
}
.card {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.25rem;
}
.card h3 {
  font-size: 1rem;
  margin-bottom: 0.75rem;
  color: var(--accent);
}
.attr-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.6rem;
  font-size: 0.85rem;
}
.attr-label { color: var(--text-muted); }
.attr-val { font-weight: 600; }
.attr-val.red { color: var(--danger); }
.attr-val.green { color: var(--success); }
.attr-val.blue { color: var(--step-active); }
.attr-val.orange { color: var(--accent); }
.bar-wrap {
  height: 8px;
  background: var(--bg-card);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 0.75rem;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s;
}
.bar-fill.hp { background: var(--danger); }
.bar-fill.hunger { background: var(--accent); }
.bar-fill.trust { background: var(--step-active); }
.item-list { display: flex; flex-direction: column; gap: 0.35rem; }
.item-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.4rem 0.6rem;
  background: var(--bg-card);
  border-radius: 6px;
  font-size: 0.8rem;
  border: 1px solid var(--border);
}
.item-row .iname { color: var(--text); }
.item-row .icount { color: var(--accent); font-weight: 600; }
.log-list {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
  max-height: 220px;
  overflow-y: auto;
}
.log-item {
  font-size: 0.75rem;
  color: var(--text-muted);
  padding: 0.3rem 0;
  border-bottom: 1px solid var(--border);
}
.log-item:last-child { border-bottom: none; }
.log-item .log-tag {
  display: inline-block;
  padding: 0 4px;
  border-radius: 3px;
  font-size: 0.65rem;
  font-weight: 600;
  margin-right: 4px;
}
.log-tag.get { background: rgba(63,185,80,0.2); color: var(--success); }
.log-tag.lose { background: rgba(248,81,73,0.2); color: var(--danger); }
.log-tag.go { background: rgba(56,139,253,0.2); color: var(--step-active); }
.log-tag.event { background: rgba(163,113,247,0.2); color: var(--purple); }
.tip-box {
  background: rgba(56, 139, 253, 0.1);
  border: 1px solid rgba(56, 139, 253, 0.3);
  border-radius: 8px;
  padding: 0.75rem;
  font-size: 0.8rem;
  color: var(--text-muted);
}
.key-list { display: flex; flex-direction: column; gap: 0.35rem; }
.key-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.78rem; color: var(--text-muted); }
.key {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 28px;
  height: 24px;
  padding: 0 6px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text-muted);
}
.content-area {
  flex: 1;
  padding: 2rem;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.story-container {
  max-width: 720px;
  margin: 0 auto;
  width: 100%;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.story-header {
  margin-bottom: 1.5rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}
.story-header h2 {
  font-size: 1.5rem;
  color: var(--accent);
  margin-bottom: 0.25rem;
}
.story-header .location {
  font-size: 0.85rem;
  color: var(--text-muted);
}
.story-text {
  flex: 1;
  margin-bottom: 2rem;
}
.story-text p {
  margin-bottom: 1rem;
  font-size: 1rem;
  line-height: 1.9;
  color: var(--text);
}
.story-text .highlight {
  color: var(--accent);
  font-weight: 600;
}
.story-text .danger {
  color: var(--danger);
  font-weight: 600;
}
.story-text .blue {
  color: var(--step-active);
  font-weight: 600;
}
.story-text .green {
  color: var(--success);
  font-weight: 600;
}
.story-text .purple {
  color: var(--purple);
  font-weight: 600;
}
.story-text .muted {
  color: var(--text-muted);
  font-style: italic;
}
.choices {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
}
.choice-btn {
  padding: 1rem 1.25rem;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-size: 0.95rem;
  text-align: left;
  transition: all 0.2s;
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
  line-height: 1.5;
  font-family: inherit;
}
.choice-btn:hover {
  background: rgba(240, 136, 62, 0.1);
  border-color: var(--accent);
}
.choice-btn:active {
  background: rgba(240, 136, 62, 0.2);
}
.choice-btn .choice-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--accent);
  flex-shrink: 0;
}
.choice-btn:hover .choice-num {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}
.choice-btn.disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.choice-btn.disabled:hover {
  background: var(--bg-input);
  border-color: var(--border);
}
.choice-btn .req {
  display: inline-block;
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 0.25rem;
}
.overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(13, 17, 23, 0.92);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
.overlay.hidden { display: none; }
.overlay-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 3rem;
  max-width: 520px;
  width: 90%;
  text-align: center;
}
.overlay-box h2 {
  font-size: 2rem;
  color: var(--accent);
  margin-bottom: 0.5rem;
}
.overlay-box .ending-tag {
  display: inline-block;
  padding: 0.3rem 1rem;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  margin-bottom: 1rem;
}
.ending-tag.good { background: rgba(63,185,80,0.15); color: var(--success); border: 1px solid rgba(63,185,80,0.3); }
.ending-tag.bad { background: rgba(248,81,73,0.15); color: var(--danger); border: 1px solid rgba(248,81,73,0.3); }
.ending-tag.neutral { background: rgba(240,136,62,0.15); color: var(--accent); border: 1px solid rgba(240,136,62,0.3); }
.ending-tag.secret { background: rgba(163,113,247,0.15); color: var(--purple); border: 1px solid rgba(163,113,247,0.3); }
.overlay-box p {
  color: var(--text-muted);
  margin-bottom: 1.5rem;
  line-height: 1.8;
  font-size: 0.95rem;
}
.overlay-box .final-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
  margin-bottom: 1.5rem;
  text-align: left;
}
.final-stat {
  padding: 0.6rem 0.8rem;
  background: var(--bg-input);
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 0.8rem;
}
.final-stat .fl { color: var(--text-muted); }
.final-stat .fv { font-weight: 700; color: var(--accent); }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.4s ease; }
@media (max-width: 900px) {
  .main-container { flex-direction: column; }
  .sidebar {
    width: 100%;
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 1rem;
    flex-direction: row;
    flex-wrap: wrap;
  }
  .sidebar .card { flex: 1; min-width: 200px; }
  .sidebar .card.hide-mobile { display: none; }
  .content-area { padding: 1.25rem; }
  .story-header h2 { font-size: 1.25rem; }
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">灰烬之路</div>
  <div class="header-actions">
    <button class="btn" onclick="saveGame()">保存进度</button>
    <button class="btn" onclick="loadGame()">读取存档</button>
    <button class="btn btn-primary" onclick="restartGame()">重新开始</button>
  </div>
</header>

<div class="main-container">
  <nav class="sidebar">
    <div class="card">
      <h3>角色状态</h3>
      <div class="attr-row">
        <span class="attr-label">生命值</span>
        <span class="attr-val red" id="hpText">100</span>
      </div>
      <div class="bar-wrap"><div class="bar-fill hp" id="hpBar" style="width:100%"></div></div>
      <div class="attr-row">
        <span class="attr-label">饥饿值</span>
        <span class="attr-val orange" id="hungerText">80</span>
      </div>
      <div class="bar-wrap"><div class="bar-fill hunger" id="hungerBar" style="width:80%"></div></div>
      <div class="attr-row">
        <span class="attr-label">信任度</span>
        <span class="attr-val blue" id="trustText">50</span>
      </div>
      <div class="bar-wrap"><div class="bar-fill trust" id="trustBar" style="width:50%"></div></div>
      <div class="attr-row">
        <span class="attr-label">已探索</span>
        <span class="attr-val green" id="exploredText">0 处</span>
      </div>
    </div>

    <div class="card">
      <h3>背包</h3>
      <div class="item-list" id="itemList">
        <div class="item-row"><span class="iname" style="color:var(--text-muted);">空空如也</span></div>
      </div>
    </div>

    <div class="card hide-mobile">
      <h3>事件记录</h3>
      <div class="log-list" id="logList">
        <div class="log-item"><span style="color:var(--text-muted);">游戏尚未开始</span></div>
      </div>
    </div>

    <div class="card hide-mobile">
      <h3>操作提示</h3>
      <div class="key-list">
        <div class="key-row"><span class="key">1-4</span><span>快速选择选项</span></div>
        <div class="key-row"><span class="key">鼠标</span><span>点击选项推进剧情</span></div>
      </div>
      <div class="tip-box" style="margin-top:0.75rem;">
        你的每一个选择都会影响后续剧情走向。注意管理生命值和饥饿值，某些选项需要特定物品才能解锁。
      </div>
    </div>
  </nav>

  <main class="content-area">
    <div class="story-container">
      <div class="story-header">
        <h2 id="sceneTitle">灰烬之路</h2>
        <div class="location" id="sceneLocation">末日废土生存文字冒险</div>
      </div>
      <div class="story-text" id="storyText"></div>
      <div class="choices" id="choicesArea"></div>
    </div>
  </main>
</div>

<div class="overlay hidden" id="startOverlay">
  <div class="overlay-box">
    <h2>灰烬之路</h2>
    <p style="margin-top:1rem;">核战三十年后的废土世界，文明已成灰烬。<br>你在一片废墟中醒来，记忆支离破碎。<br>生存，探索，寻找真相——或在此沉沦。<br><br>游戏包含 <span style="color:var(--accent);font-weight:600;">4种结局</span>，你的每个选择都至关重要。</p>
    <button class="btn btn-primary" style="padding:0.75rem 2.5rem;font-size:1rem;" onclick="beginGame()">踏上旅途</button>
  </div>
</div>

<div class="overlay hidden" id="endOverlay">
  <div class="overlay-box">
    <div class="ending-tag" id="endingTag">结局</div>
    <h2 id="endingTitle">结局标题</h2>
    <p id="endingText">结局描述</p>
    <div class="final-stats" id="finalStats"></div>
    <button class="btn btn-primary" style="padding:0.75rem 2rem;font-size:1rem;" onclick="restartGame()">重新开始</button>
  </div>
</div>

<div class="overlay hidden" id="deathOverlay">
  <div class="overlay-box">
    <h2 style="color:var(--danger);">你倒下了</h2>
    <p id="deathText">在废土中，死亡只是另一种归宿。</p>
    <div class="final-stats" id="deathStats"></div>
    <button class="btn btn-primary" style="padding:0.75rem 2rem;font-size:1rem;" onclick="restartGame()">重新开始</button>
  </div>
</div>

<script>
// ========== 游戏状态 ==========
var state = {
  hp: 100,
  hunger: 80,
  trust: 50,
  items: {},
  explored: [],
  logs: [],
  flags: {},
  steps: 0,
  scene: 'start'
};

// ========== 场景定义 ==========
var SCENES = {
  start: {
    title: '废墟中醒来',
    location: '未知废墟 · 第1天',
    text: [
      '你睁开眼睛，头顶是断裂的天花板，灰色的天空透过裂缝洒下微弱的光。',
      '周围是坍塌的建筑残骸，空气中弥漫着灰尘和铁锈的味道。你不记得自己是谁，也不记得为什么会在这里。',
      '你的身体很虚弱，<span class="danger">胃里空空如也</span>。不远处有两条路——一条通向一栋半塌的商店，另一条延伸向更深的废墟深处。',
      '你注意到地上有一根<span class="highlight">生锈的铁管</span>，也许能派上用场。'
    ],
    choices: [
      { text: '捡起铁管，然后去商店搜索物资', next: 'shop', action: function(){ addItem('铁管',1); addLog('捡起了一根铁管','get'); } },
      { text: '不捡铁管，直接去商店搜索', next: 'shop' },
      { text: '捡起铁管，往废墟深处走', next: 'deep_ruins', action: function(){ addItem('铁管',1); addLog('捡起了一根铁管','get'); } },
      { text: '什么都不管，往废墟深处走', next: 'deep_ruins' }
    ]
  },

  shop: {
    title: '废弃商店',
    location: '废墟商店 · 第1天',
    text: [
      '你推开歪斜的店门，里面一片狼藉。货架倒了大半，地上散落着碎玻璃和发霉的包装。',
      '在柜台后面，你找到了<span class="green">半瓶矿泉水</span>和<span class="green">一包压缩饼干</span>。虽然看起来不太新鲜，但在这种地方已经是珍宝了。',
      '突然，你听到角落里传来细微的响动。一个<span class="blue">年轻女人</span>蜷缩在柜台后面，手里紧紧攥着一把小刀，惊恐地看着你。'
    ],
    choices: [
      { text: '举起双手表示没有恶意，慢慢接近她', next: 'meet_woman_peaceful', action: function(){ state.trust += 10; addLog('试图和平接触陌生女人','event'); } },
      { text: '保持距离，把找到的食物分她一半', next: 'meet_woman_share', action: function(){ state.trust += 25; removeItem('矿泉水',1); removeItem('压缩饼干',1); addLog('分享了食物给陌生女人','event'); } },
      { text: '握紧铁管，警告她不要过来', next: 'meet_woman_threat', req: { item: '铁管' }, action: function(){ state.trust -= 20; addLog('用铁管威胁了陌生女人','lose'); } },
      { text: '不理会她，拿上东西直接离开', next: 'leave_shop_alone', action: function(){ state.trust -= 5; addLog('无视了陌生女人离开','go'); } }
    ]
  },

  deep_ruins: {
    title: '废墟深处',
    location: '废墟深处 · 第1天',
    text: [
      '你沿着碎石路往深处走。周围越来越暗，建筑越来越残破。空气中有一股奇怪的味道，像是化学品。',
      '转过一个拐角，你看到地上有几具<span class="danger">干枯的尸骨</span>，旁边散落着一些装备。其中一具尸体旁有<span class="green">一把匕首</span>和一个<span class="green">急救包</span>。',
      '再往前走，你发现了一扇半掩的金属门，门上用红色油漆写着：<span class="danger">"生人勿进——避难所"</span>。门缝里透出微弱的灯光。'
    ],
    choices: [
      { text: '搜刮尸体上的装备', next: 'deep_ruins_loot', action: function(){ addItem('匕首',1); addItem('急救包',1); addLog('搜刮到了匕首和急救包','get'); state.hunger -= 5; } },
      { text: '直接推开金属门进入避难所', next: 'shelter_enter', action: function(){ addLog('闯入了避难所','go'); } },
      { text: '先搜刮装备，再进入避难所', next: 'shelter_enter', action: function(){ addItem('匕首',1); addItem('急救包',1); addLog('搜刮到装备后进入避难所','get'); state.hunger -= 5; } },
      { text: '不想冒险，原路返回去商店', next: 'shop' }
    ]
  },

  deep_ruins_loot: {
    title: '废墟深处',
    location: '废墟深处 · 第1天',
    text: [
      '你蹲下身检查尸体。从装备来看，这些人应该是某个组织的成员。臂章上有一个<span class="purple">黑色太阳</span>的标志。',
      '你拿到了匕首和急救包。翻找时还发现了一张<span class="blue">皱巴巴的纸条</span>，上面写着："避难所的入口在地下三层，密码是 0815"。'
    ],
    choices: [
      { text: '记下密码，推开金属门进入', next: 'shelter_enter', action: function(){ state.flags.know_code = true; addLog('记下了避难所密码','event'); } },
      { text: '不关心密码，直接推门进去', next: 'shelter_enter' },
      { text: '觉得太危险，返回去商店方向', next: 'shop' }
    ]
  },

  meet_woman_peaceful: {
    title: '陌生女人',
    location: '废墟商店 · 第1天',
    text: [
      '你慢慢举起双手，轻声说："我没有恶意。"'
    ],
    onEnter: function(){
      if(hasItem('铁管')){
        SCENES.meet_woman_peaceful.text.push('她看到你手里的铁管，身体缩了一下，但没有攻击。');
      }

// ========== 工具函数 ==========
function hasItem(name) { return state.items[name] && state.items[name] > 0; }
function addItem(name, count) { state.items[name] = (state.items[name] || 0) + count; }
function removeItem(name, count) {
  if (state.items[name]) {
    state.items[name] -= count;
    if (state.items[name] <= 0) delete state.items[name];
  }
}
function addLog(text, type) {
  state.logs.unshift({ text: text, type: type || 'go' });
  if (state.logs.length > 30) state.logs.length = 30;
}

function canChoose(choice) {
  if (choice.req) {
    if (choice.req.item && !hasItem(choice.req.item)) return false;
    if (choice.req.flag && !state.flags[choice.req.flag]) return false;
  }
  return true;
}

// ========== 场景渲染 ==========
function renderScene(id) {
  var scene = SCENES[id];
  if (!scene) return;
  state.scene = id;
  state.steps++;

  // 记录探索
  if (state.explored.indexOf(id) === -1) {
    state.explored.push(id);
  }

  // 标题和位置
  document.getElementById('sceneTitle').textContent = scene.title;
  document.getElementById('sceneLocation').textContent = scene.location;

  // 动态文本（onEnter）
  if (scene.onEnter) {
    scene.text = scene.onEnter();
  }

  // 文本内容
  var textHtml = '';
  for (var i = 0; i < scene.text.length; i++) {
    textHtml += '<p>' + scene.text[i] + '</p>';
  }
  var storyEl = document.getElementById('storyText');
  storyEl.innerHTML = textHtml;
  storyEl.className = 'story-text fade-in';

  // 选项
  var choicesHtml = '';
  for (var j = 0; j < scene.choices.length; j++) {
    var c = scene.choices[j];
    var disabled = !canChoose(c);
    var reqText = '';
    if (c.req) {
      if (c.req.item && !hasItem(c.req.item)) reqText = '需要：' + c.req.item;
      if (c.req.flag && !state.flags[c.req.flag]) reqText = '需要：特定线索';
    }
    choicesHtml += '<button class="choice-btn' + (disabled ? ' disabled' : '') + '" '
      + (disabled ? '' : 'onclick="makeChoice(' + j + ')"') + '>'
      + '<span class="choice-num">' + (j + 1) + '</span>'
      + '<span><span>' + c.text + '</span>'
      + (reqText ? '<div class="req">' + reqText + '</div>' : '')
      + '</span></button>';
  }
  document.getElementById('choicesArea').innerHTML = choicesHtml;

  // 结局判断
  if (scene.ending) {
    setTimeout(function(){ showEnding(scene.ending); }, 800);
  }

  // 饥饿自然消耗
  state.hunger -= 2;
  if (state.hunger < 0) state.hunger = 0;
  if (state.hunger <= 0) { state.hp -= 5; }

  // 死亡判断
  if (state.hp <= 0) {
    setTimeout(function(){ showDeath(); }, 500);
  }

  updateSidebar();
  window.scrollTo(0, 0);
}

function makeChoice(index) {
  var scene = SCENES[state.scene];
  var choice = scene.choices[index];
  if (!choice || !canChoose(choice)) return;
  if (choice.action) choice.action();
  if (choice.next) renderScene(choice.next);
}

// ========== 结局 ==========
function showEnding(ending) {
  var tagClass = ending.type;
  var tagText = ending.type === 'good' ? '好结局' : ending.type === 'bad' ? '坏结局' : ending.type === 'secret' ? '隐藏结局' : '中性结局';
  document.getElementById('endingTag').className = 'ending-tag ' + tagClass;
  document.getElementById('endingTag').textContent = tagText;
  document.getElementById('endingTitle').textContent = ending.title;
  document.getElementById('endingText').textContent = ending.desc;
  document.getElementById('finalStats').innerHTML =
    '<div class="final-stat"><span class="fl">探索场景</span><span class="fv">' + state.explored.length + ' 处</span></div>'
    + '<div class="final-stat"><span class="fl">总步数</span><span class="fv">' + state.steps + ' 步</span></div>'
    + '<div class="final-stat"><span class="fl">信任度</span><span class="fv">' + state.trust + '</span></div>'
    + '<div class="final-stat"><span class="fl">剩余生命</span><span class="fv">' + state.hp + '</span></div>';
  document.getElementById('endOverlay').classList.remove('hidden');
}

function showDeath() {
  document.getElementById('deathText').textContent = state.hunger <= 0 ? '你在饥饿中倒下了。废土不会怜悯任何人。' : '你的伤势过重，再也无法继续前行。';
  document.getElementById('deathStats').innerHTML =
    '<div class="final-stat"><span class="fl">探索场景</span><span class="fv">' + state.explored.length + ' 处</span></div>'
    + '<div class="final-stat"><span class="fl">总步数</span><span class="fv">' + state.steps + ' 步</span></div>'
    + '<div class="final-stat"><span class="fl">死亡原因</span><span class="fv">' + (state.hunger <= 0 ? '饥饿' : '伤势过重') + '</span></div>'
    + '<div class="final-stat"><span class="fl">携带物品</span><span class="fv">' + Object.keys(state.items).length + ' 种</span></div>';
  document.getElementById('deathOverlay').classList.remove('hidden');
}

// ========== 侧栏更新 ==========
function updateSidebar() {
  document.getElementById('hpText').textContent = state.hp;
  document.getElementById('hpBar').style.width = Math.max(0, state.hp) + '%';
  document.getElementById('hungerText').textContent = state.hunger;
  document.getElementById('hungerBar').style.width = Math.max(0, state.hunger) + '%';
  document.getElementById('trustText').textContent = state.trust;
  document.getElementById('trustBar').style.width = Math.max(0, Math.min(100, state.trust)) + '%';
  document.getElementById('exploredText').textContent = state.explored.length + ' 处';

  // 生命值颜色
  var hpEl = document.getElementById('hpText');
  hpEl.className = 'attr-val ' + (state.hp <= 30 ? 'red' : state.hp <= 60 ? 'orange' : 'red');

  // 背包
  var itemKeys = Object.keys(state.items);
  var listEl = document.getElementById('itemList');
  if (itemKeys.length === 0) {
    listEl.innerHTML = '<div class="item-row"><span class="iname" style="color:var(--text-muted);">空空如也</span></div>';
  } else {
    var html = '';
    for (var i = 0; i < itemKeys.length; i++) {
      html += '<div class="item-row"><span class="iname">' + itemKeys[i] + '</span><span class="icount">x' + state.items[itemKeys[i]] + '</span></div>';
    }
    listEl.innerHTML = html;
  }

  // 日志
  var logEl = document.getElementById('logList');
  if (state.logs.length === 0) {
    logEl.innerHTML = '<div class="log-item"><span style="color:var(--text-muted);">暂无记录</span></div>';
  } else {
    var logHtml = '';
    for (var j = 0; j < Math.min(state.logs.length, 15); j++) {
      var log = state.logs[j];
      var tagHtml = '<span class="log-tag ' + (log.type || 'go') + '">' + (log.type === 'get' ? '获得' : log.type === 'lose' ? '失去' : log.type === 'event' ? '事件' : '移动') + '</span>';
      logHtml += '<div class="log-item">' + tagHtml + log.text + '</div>';
    }
    logEl.innerHTML = logHtml;
  }
}

// ========== 存取 ==========
function saveGame() {
  localStorage.setItem('ashRoad_save', JSON.stringify(state));
  alert('进度已保存');
}
function loadGame() {
  var saved = localStorage.getItem('ashRoad_save');
  if (saved) {
    state = JSON.parse(saved);
    // 重建场景文本
    rebuildSceneText(state.scene);
    renderScene(state.scene);
    alert('存档已读取');
  } else {
    alert('没有找到存档');
  }
}
function rebuildSceneText(id) {
  var scene = SCENES[id];
  if (!scene) return;
  // 对于有onEnter的场景，重置默认文本让onEnter重新生成
  if (id === 'meet_woman_peaceful') {
    scene.text = ['你慢慢举起双手，轻声说："我没有恶意。"'];
  } else if (id === 'shelter_enter') {
    scene.text = [
      '你推开金属门，一股霉味扑面而来。里面是向下延伸的楼梯，墙壁上有应急灯发出昏黄的光。',
      '楼梯走到尽头是一条走廊，两边有几扇门。走廊尽头有个<span class="highlight">电子门锁</span>，旁边有一个数字键盘。'
    ];
  } else if (id === 'shelter_supply') {
    scene.text = ['你用匕首花了十几分钟撬开了门锁。里面虽然大部分货架已经空了，但你还是找到了一些东西：'];
  } else if (id === 'shelter_secret') {
    scene.text = [
      '密码正确，门缓缓打开。里面是一个小型指挥室，墙上挂着一幅巨大的<span class="purple">废土地图</span>，上面标注了各种据点和资源点。',
      '地图上用红色圈出了<span class="highlight">"方舟"的位置</span>——在旧城区水处理厂的地下深处。还标注了沿途的危险区域和安全路线。',
      '桌上有一台还能用的无线电，你试着打开，里面传出断断续续的人声：<span class="blue">"……黎明阵线……招募……水处理厂……集合……"</span>'
    ];
  } else if (id === 'danger_room') {
    scene.text = [
      '你推开门，一股刺鼻的气味涌出。里面的容器大部分已经破碎，地上有不明液体的痕迹。',
      '你突然感到一阵<span class="danger">眩晕</span>。这里的空气可能有毒。你必须在晕倒之前离开。'
    ];
  } else if (id === 'radiation_zone') {
    scene.text = ['你无视林薇的警告径直走了过去。走了十几分钟后，皮肤开始发痒，嘴里有金属味。'];
  } else if (id === 'detour_safe') {
    if (state.flags.with_woman) {
      scene.text = [
        '绕道走了两个小时，路确实安全。林薇在路上给你指认了一些可食用的野生植物，补充了一些食物。',
        '你们来到了一个<span class="highlight">十字路口</span>。左边有一条宽阔的路通向远处的建筑群，右边的小路通向山区。路上有一块路牌写着："旧城区 → 8km"。'
      ];
    } else {
      scene.text = [
        '你绕道走了两个小时，路确实安全，但更饿了。',
        '你来到一个<span class="highlight">十字路口</span>。左边通向远处建筑群，右边小路通向山区。路牌写着："旧城区 → 8km"。'
      ];
    }
  } else if (id === 'old_city_approach') {
    scene.text = [
      '经过三天的跋涉，你终于到达了旧城区。这里的建筑比之前经过的废墟保存得更完整，但也更危险。',
      '水处理厂在城区中央，一座灰色的混凝土建筑，旁边是那座标志性的<span class="highlight">水塔</span>。'
    ];
  } else if (id === 'factory_front') {
    scene.text = [
      '你走到正门，举起双手示意自己没有武器。守卫用枪指着你，喝令你停下。',
      '"什么人！报上名来！"'
    ];
  } else if (id === 'drain_water_run') {
    scene.text = [
      '你拼命奔跑，水下的东西追了几步就放弃了。你冲到了通道尽头——一扇铁门，上面有一个电子密码锁。',
      '密码是四位数字。'
    ];
  } else if (id === 'dawn_reward') {
    scene.text = ['"不错，"陈指挥官露出满意的笑容，"你明天就可以进方舟了。先去休息吧。"'];
  } else if (id === 'cave_letter') {
    scene.text = ['信上写着：'];
  } else if (id === 'camp_joined') {
    scene.text = ['你在营地待了两天，帮忙做事换取食物。营地的人对你还算友好。'];
  } else if (id === 'ending_ark') {
    scene.text = [
      '气密门缓缓打开，一股温暖的空气涌出。你走进了方舟——',
      '明亮的人工照明照亮了一个巨大的地下空间。你能看到绿色的农田区域、整洁的居住舱、闪烁的能源装置。这里就像另一个世界。',
      '几个穿着白大褂的人惊讶地看着你。其中一个走过来："你是怎么找到这里的？……算了，先进来吧。"'
    ];
  }
}

// ========== 控制 ==========
function beginGame() {
  document.getElementById('startOverlay').classList.add('hidden');
  renderScene('start');
}

function restartGame() {
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('endOverlay').classList.add('hidden');
  document.getElementById('deathOverlay').classList.add('hidden');
  state = {
    hp: 100, hunger: 80, trust: 50,
    items: {}, explored: [], logs: [], flags: {},
    steps: 0, scene: 'start'
  };
  // 重建所有场景文本
  SCENES.meet_woman_peaceful.text = ['你慢慢举起双手，轻声说："我没有恶意。"'];
  SCENES.shelter_enter.text = [
    '你推开金属门，一股霉味扑面而来。里面是向下延伸的楼梯，墙壁上有应急灯发出昏黄的光。',
    '楼梯走到尽头是一条走廊，两边有几扇门。走廊尽头有个<span class="highlight">电子门锁</span>，旁边有一个数字键盘。'
  ];
  renderScene('start');
}

// 键盘快捷键
document.addEventListener('keydown', function(e) {
  var num = parseInt(e.key);
  if (num >= 1 && num <= 4) {
    var btns = document.querySelectorAll('.choice-btn:not(.disabled)');
    if (btns[num - 1]) btns[num - 1].click();
  }
});

// ========== 启动 ==========
updateSidebar();
</script>
</body>
</html>
