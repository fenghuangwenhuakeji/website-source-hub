<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凤煌管理后台 - 连接失败</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f5f7ff;
            background:
                radial-gradient(circle at top left, rgba(124, 58, 237, 0.22), transparent 28%),
                radial-gradient(circle at top right, rgba(34, 211, 238, 0.14), transparent 24%),
                linear-gradient(180deg, #050814 0%, #0b1220 100%);
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.08) 0 1px, transparent 1.5px),
                radial-gradient(circle at 70% 30%, rgba(255, 255, 255, 0.08) 0 1px, transparent 1.5px);
            background-size: 220px 220px, 280px 280px;
            opacity: 0.55;
            mix-blend-mode: screen;
        }
        .error-container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
            max-width: 520px;
            background: rgba(8, 13, 24, 0.82);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 24px;
            backdrop-filter: blur(18px);
            box-shadow: 0 24px 64px rgba(2, 6, 23, 0.28);
        }
        .error-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #f5f7ff;
        }
        p {
            font-size: 16px;
            color: rgba(226, 232, 240, 0.76);
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .retry-btn {
            background: linear-gradient(135deg, #7c3aed 0%, #22d3ee 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: 600;
            box-shadow: 0 18px 40px rgba(124, 58, 237, 0.24);
        }
        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 48px rgba(34, 211, 238, 0.26);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">✦</div>
        <h1>连接失败</h1>
        <p>管理后台暂时无法连接到服务，请稍后再试。当前界面已经切换到统一的星空深色视觉。</p>
        <button class="retry-btn" onclick="location.reload()">重新连接</button>
    </div>
</body>
</html>
