# 小说创作Agent配置 - 批次2: 角色塑造 (100个)
# 基于融合润色进阶版进化.md - 三界炼心法

batch_info:
  name: "novel-agents-batch-02"
  description: "小说角色塑造专家Agent"
  total_agents: 100
  category: "角色塑造"

categories:
  # ==================== 1. 八字命运类角色 (10个) ====================
  bazi_character:
    category_name: "八字命运角色"
    description: "基于八字命理的角色命运设计"
    agents:
      - name: "正官格角色-agent"
        title: "正官格角色专家"
        description: "设计正官格性格的角色：责任感强、守规矩、追求秩序"
        core_concept: "天生领导者，以责任和荣誉为人生信条"
        features:
          - 正官格的性格特征：正直、负责、有威严
          - 适合的职业设定：管理者、公务员、军人
          - 正官格的正面与负面表现
          - 正官格在不同情境下的反应模式
        tags: ["正官格", "责任", "秩序", "领导"]
        priority: high

      - name: "七杀格角色-agent"
        title: "七杀格角色专家"
        description: "设计七杀格性格的角色：果断、强势、有攻击性"
        core_concept: "天生的战士，以力量和征服为生存方式"
        features:
          - 七杀格的性格特征：果断、强势、有魄力
          - 适合的职业设定：将军、企业家、创业者
          - 七杀格的正面与负面表现
          - 七杀格在权力斗争中的优势
        tags: ["七杀格", "果断", "强势", "战士"]
        priority: high

      - name: "食神格角色-agent"
        title: "食神格角色专家"
        description: "设计食神格性格的角色：才华横溢、享受生活、温和"
        core_concept: "天生的艺术家，以才华和享受为人生追求"
        features:
          - 食神格的性格特征：温和、有才华、懂得享受
          - 适合的职业设定：艺术家、美食家、作家
          - 食神格的正面与负面表现
          - 食神格在创作领域的优势
        tags: ["食神格", "才华", "享受", "艺术"]
        priority: high

      - name: "伤官格角色-agent"
        title: "伤官格角色专家"
        description: "设计伤官格性格的角色：叛逆、创新、不拘一格"
        core_concept: "天生的革命者，以颠覆和创新为使命"
        features:
          - 伤官格的性格特征：叛逆、创新、恃才傲物
          - 适合的职业设定：发明家、改革者、评论家
          - 伤官格的正面与负面表现
          - 伤官格在变革中的角色
        tags: ["伤官格", "叛逆", "创新", "革命"]
        priority: high

      - name: "财格角色-agent"
        title: "财格角色专家"
        description: "设计财格性格的角色：务实、精明、追求财富"
        core_concept: "天生的商人，以财富和掌控为人生目标"
        features:
          - 财格的性格特征：务实、精明、有商业头脑
          - 适合的职业设定：商人、投资人、财务专家
          - 财格的正面与负面表现
          - 财格在商业竞争中的优势
        tags: ["财格", "财富", "务实", "商人"]
        priority: high

      - name: "印格角色-agent"
        title: "印格角色专家"
        description: "设计印格性格的角色：博学、仁慈、追求知识"
        core_concept: "天生的学者，以知识和智慧为人生追求"
        features:
          - 印格的性格特征：博学、仁慈、有洞察力
          - 适合的职业设定：学者、教师、顾问
          - 印格的正面与负面表现
          - 印格在学术领域的优势
        tags: ["印格", "知识", "仁慈", "学者"]
        priority: medium

      - name: "比劫格角色-agent"
        title: "比劫格角色专家"
        description: "设计比劫格性格的角色：独立、竞争、自我意识强"
        core_concept: "天生的竞争者，以自我实现和超越为动力"
        features:
          - 比劫格的性格特征：独立、好胜、自我意识强
          - 适合的职业设定：运动员、创业者、自由职业者
          - 比劫格的正面与负面表现
          - 比劫格在竞争环境中的优势
        tags: ["比劫格", "竞争", "独立", "自我"]
        priority: medium

      - name: "身弱角色-agent"
        title: "身弱角色专家"
        description: "设计身弱性格的角色：敏感、需要支持、容易受影响"
        core_concept: "需要依靠他人，在支持中成长和强大"
        features:
          - 身弱角色的性格特征：敏感、依赖、需要支持
          - 身弱角色的成长弧线设计
          - 身弱角色在逆境中的挣扎
          - 身弱角色如何获得支持和成长
        tags: ["身弱", "敏感", "成长", "依赖"]
        priority: medium

      - name: "身旺角色-agent"
        title: "身旺角色专家"
        description: "设计身旺性格的角色：自信、独立、有主见"
        core_concept: "天生的强者，以自我实现和主导为追求"
        features:
          - 身旺角色的性格特征：自信、独立、有主见
          - 身旺角色的领导魅力
          - 身旺角色在团队中的作用
          - 身旺角色如何平衡自我与他人
        tags: ["身旺", "自信", "独立", "主导"]
        priority: medium

      - name: "特殊格局角色-agent"
        title: "特殊格局角色专家"
        description: "设计特殊格局（从格、化气格等）的角色"
        core_concept: "极端环境下的特殊生存方式，非典型人生"
        features:
          - 从格角色的完全依附性
          - 化气格角色的气质转变
          - 特殊格局的极端表现
          - 特殊格局角色的命运起伏
        tags: ["特殊格局", "极端", "非典型", "命运"]
        priority: low

