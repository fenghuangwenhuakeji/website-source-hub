# ==========================================
# 元数据配置
# ==========================================
metadata:
  total_agents: 50
  categories:
    - name: "商业"
      count: 10
      color: "#9b59b6"
    - name: "装修设计"
      count: 10
      color: "#e67e22"
    - name: "3D设计"
      count: 10
      color: "#1abc9c"
    - name: "电商"
      count: 10
      color: "#f39c12"
    - name: "网络运营"
      count: 10
      color: "#3498db"
  
  generation_settings:
    parallel: true
    max_concurrent: 10
    retry_on_failure: true
    generate_index: true
    generate_readme: true
  
  quality_checks:
    - "文档完整性"
    - "命名规范性"
    - "内容质量"
    - "标签准确性"
    - "优先级合理性"

# ==========================================
# 生成后操作
# ==========================================
post_generation:
  actions:
    - type: "generate_index"
      filename: "AGENTS_INDEX.md"
      description: "生成Agent目录索引"
    
    - type: "generate_category_readme"
      description: "为每个类别生成README"
    
    - type: "generate_dependency_graph"
      description: "生成Agent依赖关系图"
    
    - type: "validation_report"
      description: "生成验证报告"

# ==========================================
# 使用说明
# ==========================================
usage:
  command: "使用 batch-agent-creator skill 加载此配置文件"
  example: "根据 business-agents-config.yaml 批量创建所有Agent"
  notes:
    - "确保已安装 batch-agent-creator skill"
    - "配置文件支持YAML和JSON格式"
    - "可以分批次生成，按优先级筛选"
    - "生成后可进行质量检查和调整"
