# ==========================================
# 元数据配置
# ==========================================
metadata:
  total_agents: 100
  categories:
    - name: "农业"
      count: 20
      color: "#27ae60"
    - name: "制造业"
      count: 20
      color: "#34495e"
    - name: "能源"
      count: 20
      color: "#f39c12"
    - name: "环保"
      count: 20
      color: "#16a085"
    - name: "物流运输"
      count: 20
      color: "#2980b9"
  
  generation_settings:
    parallel: true
    max_concurrent: 10
    retry_on_failure: true
    generate_index: true
    generate_readme: true
  
  quality_checks:
    - "文档完整性"
    - "命名规范性"
    - "内容质量"
    - "标签准确性"
    - "优先级合理性"

# ==========================================
# 生成后操作
# ==========================================
post_generation:
  actions:
    - type: "generate_index"
      filename: "AGENTS_INDEX.md"
      description: "生成Agent目录索引"
    
    - type: "generate_category_readme"
      description: "为每个类别生成README"
    
    - type: "validation_report"
      description: "生成验证报告"

# ==========================================
# 使用说明
# ==========================================
usage:
  command: "使用 batch-agent-creator skill 加载此配置文件"
  example: "根据 industrial-agents-batch-1.yaml 批量创建所有Agent"
  notes:
    - "本批次包含农业、制造业、能源、环保、物流运输5个基础产业领域共100个Agent"
    - "这些Agent针对工业和基础产业场景设计"
    - "建议根据实际需求选择生成"
