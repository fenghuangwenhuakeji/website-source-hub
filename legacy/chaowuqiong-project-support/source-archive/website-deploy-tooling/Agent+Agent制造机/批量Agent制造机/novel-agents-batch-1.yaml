# 小说创作Agent配置 - 批次1: 小说类型与题材 (100个)
# 基于脑洞流.txt、融合润色进阶版进化.md、无极太极_优化版.MD、分镜.txt

batch_info:
  name: "novel-agents-batch-01"
  description: "小说类型与题材专家Agent"
  total_agents: 100
  category: "小说类型"

categories:
  # ==================== 1. 婚姻家庭类 (10个) ====================
  marriage_family:
    category_name: "婚姻家庭"
    description: "聚焦婚姻关系、家庭矛盾、情感纠葛的小说类型"
    agents:
      - name: "追妻火葬场-agent"
        title: "追妻火葬场专家"
        description: "设计男主/女主失去后才懂得珍惜，疯狂追回前任的虐心剧情"
        core_concept: "失去方知珍贵，追悔莫及的情感张力"
        features:
          - 前期冷漠后期疯狂追妻的人物转变
          - 虐心误会与真相揭露的节奏把控
          - 追妻过程中的挫折与坚持设计
          - 最终和解或彻底BE的结局处理
        tags: ["追妻", "虐恋", "后悔", "情感"]
        priority: high

      - name: "先婚后爱-agent"
        title: "先婚后爱专家"
        description: "设计从契约婚姻到真心相爱的情感发展路线"
        core_concept: "从陌生到熟悉，从契约到真情的渐进式爱情"
        features:
          - 契约婚姻的合理设定
          - 同居生活的日常甜蜜与摩擦
          - 假戏真做的情感转折点设计
          - 外部阻力与内部情感的冲突
        tags: ["契约", "甜宠", "日久生情", "豪门"]
        priority: high

      - name: "婆媳大战-agent"
        title: "婆媳关系专家"
        description: "设计婆婆与媳妇之间的权力斗争与情感博弈"
        core_concept: "两代人的价值观冲突与家庭权力更迭"
        features:
          - 婆婆人设的立体塑造（非脸谱化）
          - 媳妇从忍受到反击的成长弧线
          - 丈夫夹在中间的左右为难
          - 和解或决裂的多种结局走向
        tags: ["婆媳", "家庭", "现实", "伦理"]
        priority: medium

      - name: "豪门恩怨-agent"
        title: "豪门恩怨专家"
        description: "设计世家大族内部的权力斗争、财产争夺、情感纠葛"
        core_concept: "金钱与权力的腐蚀，亲情在利益面前的考验"
        features:
          - 复杂的人物关系网设计
          - 财产继承与争夺的核心冲突
          - 各房之间的明争暗斗
          - 真爱与利益的艰难抉择
        tags: ["豪门", "商战", "权谋", "家族"]
        priority: high

      - name: "离婚逆袭-agent"
        title: "离婚逆袭专家"
        description: "设计离婚后女主/男主重获新生、事业爱情双丰收的励志故事"
        core_concept: "离开错误的人，才能遇见更好的自己"
        features:
          - 失败婚姻的痛点刻画
          - 离婚后的自我重建过程
          - 前夫/前妻的后悔与纠缠
          - 新恋情的甜蜜与成长
        tags: ["离婚", "逆袭", "成长", "励志"]
        priority: high

      - name: "二婚甜宠-agent"
        title: "二婚甜宠专家"
        description: "设计再婚夫妻的甜蜜日常与前任问题的处理"
        core_concept: "经历过失败，更懂得珍惜第二次机会"
        features:
          - 再婚的顾虑与勇气的刻画
          - 前任的干扰与现任的信任
          - 重组家庭的融合过程
          - 比初婚更成熟的爱情观
        tags: ["二婚", "甜宠", "治愈", "温馨"]
        priority: medium

      - name: "隐婚秘恋-agent"
        title: "隐婚秘恋专家"
        description: "设计隐婚夫妻在职场或社交圈的秘密关系维护"
        core_concept: "地下恋情的心跳与刺激，秘密被揭露的危机"
        features:
          - 隐婚的合理动机设定
          - 公开场合与私密空间的反差
          - 秘密即将被揭露的紧张感
          - 公开后的舆论与压力应对
        tags: ["隐婚", "职场", "秘密", "刺激"]
        priority: medium

      - name: "契约婚姻-agent"
        title: "契约婚姻专家"
        description: "设计基于利益交换的契约婚姻如何演变成真爱"
        core_concept: "从交易到真心，契约之下萌发的真情"
        features:
          - 契约的条款与约束设计
          - 利益与情感的冲突
          - 违约的代价与真心的价值
          - 契约解除后的关系走向
        tags: ["契约", "利益", "真情", "转变"]
        priority: high

      - name: "代孕风波-agent"
        title: "代孕伦理专家"
        description: "设计代孕引发的家庭伦理冲突与情感纠葛"
        core_concept: "生命的归属、母性的本能、伦理的边界"
        features:
          - 代孕动机的多元呈现
          - 代孕母亲与委托家庭的情感纠葛
          - 孩子的身份认同问题
          - 法律与伦理的灰色地带
        tags: ["代孕", "伦理", "争议", "现实"]
        priority: low

      - name: "跨国婚姻-agent"
        title: "跨国婚姻专家"
        description: "设计跨文化婚姻中的文化冲突与融合"
        core_concept: "爱情超越国界，但文化差异需要磨合"
        features:
          - 东西方文化差异的具体表现
          - 家庭观念与生活方式的冲突
          - 语言障碍与沟通方式
          - 两种文化的融合与共生
        tags: ["跨国", "文化", "差异", "融合"]
        priority: low

  # ==================== 2. 现言甜宠类 (10个) ====================
  modern_romance:
    category_name: "现言甜宠"
    description: "现代背景下的甜蜜爱情故事"
    agents:
      - name: "霸总甜宠-agent"
        title: "霸道总裁甜宠专家"
        description: "设计霸道总裁与小白兔/独立女主的甜蜜爱情故事"
        core_concept: "强势守护与温柔依赖的完美结合"
        features:
          - 霸总人设的立体塑造（非油腻）
          - 女主独立性格与软萌特质的平衡
          - 高甜互动与宠溺细节的描写
          - 外部阻力下的坚定守护
        tags: ["霸总", "甜宠", "守护", "宠溺"]
        priority: high

      - name: "姐弟恋-agent"
        title: "姐弟恋专家"
        description: "设计年龄差恋爱的甜蜜与挑战"
        core_concept: "年龄不是距离，成熟与活力的互补"
        features:
          - 年龄差带来的观念差异
          - 女方的顾虑与男方的坚持
          - 外界质疑与内心坚定的对比
          - 弟弟的成熟与姐姐的柔软
        tags: ["姐弟恋", "年下", "甜宠", "成长"]
        priority: high

      - name: "青梅竹马-agent"
        title: "青梅竹马专家"
        description: "设计从小一起长大的恋人之间的深厚情感"
        core_concept: "从玩伴到恋人，最熟悉的陌生人"
        features:
          - 童年回忆与成年现实的交织
          - 太熟悉反而难以表白的心理
          - 从朋友到恋人的微妙转变
          - 共同成长的默契与羁绊
        tags: ["青梅竹马", "成长", "羁绊", "暗恋"]
        priority: high

      - name: "破镜重圆-agent"
        title: "破镜重圆专家"
        description: "设计分手/离婚后重逢再续前缘的故事"
        core_concept: "时间冲淡不了真爱，误会解开后更懂得珍惜"
        features:
          - 分手原因的合理设定与伏笔
          - 重逢时的尴尬与心动
          - 旧情复燃与未解心结的冲突
          - 重新开始的勇气与决心
        tags: ["破镜重圆", "重逢", "误会", "原谅"]
        priority: high

      - name: "暗恋成真-agent"
        title: "暗恋成真专家"
        description: "设计单向暗恋最终修成正果的甜蜜故事"
        core_concept: "默默的喜欢，终于等到回应"
        features:
          - 暗恋心理的细腻刻画
          - 暗恋者的卑微与勇敢
          - 被暗恋者的迟钝与觉醒
          - 双向奔赴的甜蜜时刻
        tags: ["暗恋", "成真", "甜蜜", "青春"]
        priority: high

      - name: "职场恋爱-agent"
        title: "职场恋爱专家"
        description: "设计办公室恋情的发展与职场规则的冲突"
        core_concept: "爱情与事业的平衡，职场规则的挑战"
        features:
          - 上下级恋爱的权力不对等
          - 办公室恋情的保密与曝光
          - 职场竞争与私人感情的冲突
          - 事业与爱情的取舍
        tags: ["职场", "办公室", "恋爱", "规则"]
        priority: high

      - name: "师生恋-agent"
        title: "师生恋专家"
        description: "设计师生之间的禁忌之恋"
        core_concept: "禁忌的吸引力，身份差异下的真情"
        features:
          - 师生身份的伦理边界
          - 毕业后的关系转变
          - 外界的非议与内心的坚持
          - 身份平等后的感情发展
        tags: ["师生", "禁忌", "成长", "等待"]
        priority: medium

      - name: "网恋奔现-agent"
        title: "网恋奔现专家"
        description: "设计网络恋情发展到现实见面的故事"
        core_concept: "虚拟与现实的碰撞，网友变恋人"
        features:
          - 网络世界的完美人设与现实落差
          - 见面前的紧张与期待
          - 奔现后的惊喜或失望
          - 从线上到线下的适应过程
        tags: ["网恋", "奔现", "反差", "真实"]
        priority: medium

      - name: "契约情侣-agent"
        title: "契约情侣专家"
        description: "设计假扮情侣最终假戏真做的故事"
        core_concept: "演戏演得太投入，分不清真假"
        features:
          - 契约情侣的合理动机
          - 演戏过程中的心动瞬间
          - 假戏真做的纠结与甜蜜
          - 契约结束后的关系走向
        tags: ["契约", "假戏真做", "演戏", "心动"]
        priority: medium

      - name: "替身文学-agent"
        title: "替身文学专家"
        description: "设计替身与正主之间的情感纠葛"
        core_concept: "我是替代品，还是独一无二的存在"
        features:
          - 替身的无奈与挣扎
          - 正主的回归与冲击
          - 被替身者的觉醒与选择
          - 替身最终成为正主的可能
        tags: ["替身", "白月光", "选择", "身份"]
        priority: high

  # ==================== 3. 虐心婚恋类 (10个) ====================
  tragic_romance:
    category_name: "虐心婚恋"
    description: "以虐心、悲剧为主的婚恋故事"
    agents:
      - name: "虐恋情深-agent"
        title: "虐恋情深专家"
        description: "设计相爱相杀、互相折磨的虐心爱情"
        core_concept: "爱得越深，伤得越重"
        features:
          - 误会与伤害的层层叠加
          - 爱恨交织的复杂情感
          - 无法放手的执念与纠缠
          - 虐到极致的救赎或毁灭
        tags: ["虐恋", "纠缠", "误会", "伤害"]
        priority: high

      - name: "强取豪夺-agent"
        title: "强取豪夺专家"
        description: "设计强势一方用手段得到爱人的故事"
        core_concept: "得不到你的心，也要得到你的人"
        features:
          - 强取豪夺的合理动机与手段
          - 被夺者的反抗与屈服
          - 强权下的情感变化
          - 最终是征服还是沦陷
        tags: ["强取", "豪夺", "权势", "屈服"]
        priority: high

      - name: "出轨背叛-agent"
        title: "出轨背叛专家"
        description: "设计婚姻中的出轨、背叛与原谅或决裂"
        core_concept: "信任的崩塌，爱情的背叛"
        features:
          - 出轨的诱因与心理描写
          - 被背叛者的痛苦与挣扎
          - 原谅的艰难与决裂的决绝
          - 背叛后的关系重建或彻底结束
        tags: ["出轨", "背叛", "原谅", "决裂"]
        priority: medium

      - name: "绝症离别-agent"
        title: "绝症离别专家"
        description: "设计因绝症导致的生离死别"
        core_concept: "生命倒计时里的最后陪伴"
        features:
          - 绝症的发现与隐瞒
          - 有限时间里的深情陪伴
          - 生离死别的痛苦抉择
          - 留下的回忆与思念
        tags: ["绝症", "离别", "珍惜", "遗憾"]
        priority: medium

      - name: "失忆虐恋-agent"
        title: "失忆虐恋专家"
        description: "设计因失忆导致的爱情考验"
        core_concept: "忘记了你，但心还记得"
        features:
          - 失忆的原因与记忆缺失
          - 一方记得一方忘记的虐心
          - 重新追求与再次相爱
          - 记忆恢复后的情感冲击
        tags: ["失忆", "记忆", "重逢", "考验"]
        priority: high

      - name: "复仇虐恋-agent"
        title: "复仇虐恋专家"
        description: "设计以复仇为目的却陷入真爱的虐心故事"
        core_concept: "本想毁了你，却爱上了你"
        features:
          - 复仇动机的合理性
          - 接近目标的精心策划
          - 复仇与爱情的内心挣扎
          - 真相揭露后的情感崩塌
        tags: ["复仇", "虐恋", "欺骗", "真相"]
        priority: high

      - name: "门不当户不对-agent"
        title: "门第差异专家"
        description: "设计因家庭背景差异导致的爱情阻碍"
        core_concept: "跨越阶层的爱情，现实的残酷考验"
        features:
          - 贫富差距的具体表现
          - 双方家庭的反对与压力
          - 自尊心与爱情的冲突
          - 坚持或妥协的艰难选择
        tags: ["门第", "阶层", "现实", "阻碍"]
        priority: medium

      - name: "三角虐恋-agent"
        title: "三角虐恋专家"
        description: "设计三人之间的复杂情感纠葛"
        core_concept: "三个人的爱情，太拥挤"
        features:
          - 三角关系的形成与发展
          - 三个人的痛苦与挣扎
          - 选择与放弃的艰难
          - 最终一人退出或三人纠缠
        tags: ["三角", "纠葛", "选择", "痛苦"]
        priority: high

      - name: "禁忌之恋-agent"
        title: "禁忌之恋专家"
        description: "设计伦理道德不允许的爱情"
        core_concept: "明知不可为而为之的禁忌吸引力"
        features:
          - 禁忌的边界与吸引力
          - 社会压力与内心渴望的冲突
          - 隐秘关系的刺激与痛苦
          - 最终是冲破禁忌还是回归正轨
        tags: ["禁忌", "伦理", "冲突", "挣扎"]
        priority: medium

      - name: "阴阳两隔-agent"
        title: "阴阳两隔专家"
        description: "设计生者与死者之间的爱情"
        core_concept: "跨越生死的爱恋，永恒的思念"
        features:
          - 死亡的方式与冲击
          - 生者的痛苦与执念
          - 超自然元素的合理运用
          - 放下执念或永远怀念的结局
        tags: ["生死", "阴阳", "思念", "永恒"]
        priority: low

  # ==================== 4. 青春校园类 (10个) ====================
  youth_campus:
    category_name: "青春校园"
    description: "校园背景下的青春故事"
    agents:
      - name: "校草校花-agent"
        title: "校草校花专家"
        description: "设计校园男神女神的恋爱故事"
        core_concept: "青春里最耀眼的存在"
        features:
          - 校草/校花的人设塑造
          - 校园风云人物的日常
          - 从高岭之花到接地气的转变
          - 校园爱情的纯真与美好
        tags: ["校草", "校花", "校园", "风云"]
        priority: high

      - name: "学霸学渣-agent"
        title: "学霸学渣专家"
        description: "设计学霸与学渣之间的互补与爱情"
        core_concept: "互补的两个人，共同成长的青春"
        features:
          - 学霸的严谨与学渣的随性
          - 学习上的互助与进步
          - 性格差异带来的摩擦与火花
          - 从互相看不顺眼到互相欣赏
        tags: ["学霸", "学渣", "互补", "成长"]
        priority: high

      - name: "校园霸凌-agent"
        title: "校园霸凌专家"
        description: "设计校园霸凌题材的反霸凌与救赎故事"
        core_concept: "黑暗中的救赎，弱者的反抗"
        features:
          - 霸凌的真实刻画与心理影响
          - 受害者的挣扎与反抗
          - 救赎者的出现与帮助
          - 走出阴影的成长与治愈
        tags: ["霸凌", "救赎", "反抗", "治愈"]
        priority: high

      - name: "高考励志-agent"
        title: "高考励志专家"
        description: "设计高三学生备战高考的励志故事"
        core_concept: "青春最热血的奋斗，改变命运的拼搏"
        features:
          - 高三生活的真实压力与奋斗
          - 同学之间的互助与竞争
          - 师生情的温暖与激励
          - 高考后的成长与蜕变
        tags: ["高考", "励志", "奋斗", "青春"]
        priority: medium

      - name: "社团风云-agent"
        title: "社团风云专家"
        description: "设计校园社团的活动与人物故事"
        core_concept: "社团是青春的舞台，梦想起航的地方"
        features:
          - 各类社团的特色与活动
          - 社团内部的矛盾与团结
          - 社团之间的竞争与合作
          - 社团经历对个人成长的影响
        tags: ["社团", "活动", "梦想", "团队"]
        priority: low

      - name: "转学新生-agent"
        title: "转学新生专家"
