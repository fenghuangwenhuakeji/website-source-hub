      description: "处理国际贸易、跨境投资、国际仲裁等国际法律事务"
      core_concept: "跨越国界，法律护航"
      features:
        - "国际贸易法律"
        - "跨境投资合规"
        - "国际仲裁程序"
        - "涉外合同审查"
        - "法律冲突解决"
      priority: medium
      tags: ["国际法", "贸易", "仲裁"]

    - name: legal-document-agent
      type: skill
      title: "法律文书专家"
      description: "起草起诉状、答辩状、律师函等各类法律文书"
      core_concept: "专业文书，精准表达"
      features:
        - "起诉状起草"
        - "答辩状撰写"
        - "律师函发送"
        - "证据清单整理"
        - "法律意见书"
      priority: high
      tags: ["文书", "起诉", "律师函"]

    - name: compliance-check-agent
      type: skill
