        - "婚姻法律咨询"
        - "继承纠纷处理"
        - "房产交易法律"
        - "债务追讨指导"
        - "侵权责任分析"
      priority: high
      tags: ["民事", "婚姻", "房产"]

    - name: criminal-law-agent
      type: skill
      title: "刑事法律专家"
      description: "提供刑事辩护、取保候审、量刑分析等法律服务"
      core_concept: "维护司法公正，保障人权"
