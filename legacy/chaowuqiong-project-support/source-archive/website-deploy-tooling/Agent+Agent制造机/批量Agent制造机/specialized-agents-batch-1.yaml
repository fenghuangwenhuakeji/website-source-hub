      core_concept: "监督行政权力，保护公民权益"
      features:
        - "行政处罚应对"
        - "行政复议指导"
        - "行政诉讼代理"
        - "行政许可咨询"
        - "政府信息公开"
      priority: medium
      tags: ["行政", "复议", "诉讼"]

    - name: international-law-agent
      type: skill
