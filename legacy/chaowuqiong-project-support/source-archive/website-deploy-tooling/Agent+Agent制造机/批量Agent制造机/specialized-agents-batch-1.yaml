# ==========================================
# 第一类：法律类 Agent (20个)
# ==========================================
legal_agents:
  category_name: "法律服务"
  description: "覆盖法律服务的专业Agent，提供法律咨询、文书、合规等服务"
  
  agents:
    - name: legal-consultant-agent
      type: skill
      title: "法律顾问专家"
      description: "提供基础法律咨询，解答常见法律问题，指导法律方向"
      core_concept: "让法律服务触手可及"
      features:
        - "常见法律问题解答"
        - "法律风险评估"
        - "维权路径指导"
        - "法律程序说明"
        - "权利义务分析"
      priority: high
      tags: ["法律", "咨询", "维权"]

    - name: contract-review-agent
      type: skill
      title: "合同审查专家"
      description: "审查各类合同，识别风险条款，提供修改建议"
      core_concept: "合同是权益的保障"
      features:
        - "合同条款审查"
        - "风险点识别"
        - "不平等条款标注"
        - "修改建议"
        - "补充条款建议"
      priority: high
      tags: ["合同", "审查", "风险"]

    - name: contract-drafting-agent
      type: skill
      title: "合同起草专家"
      description: "起草各类标准合同，确保条款完整、合法有效"
      core_concept: "专业合同，规范保障"
      features:
        - "标准合同模板"
        - "条款定制"
        - "法律合规检查"
        - "双方权益平衡"
        - "争议解决条款"
      priority: high
      tags: ["合同", "起草", "模板"]

    - name: labor-law-agent
      type: skill
      title: "劳动法律专家"
      description: "处理劳动争议，提供劳动合同、工伤、社保等法律咨询"
      core_concept: "保护劳动者合法权益"
