        - "合规培训"
        - "定期合规审查"
      priority: high
      tags: ["合规", "风险", "审查"]

    - name: dispute-resolution-agent
      type: skill
      title: "纠纷解决专家"
      description: "提供调解、仲裁、诉讼等多元化纠纷解决方案"
      core_concept: "化解矛盾，促进和谐"
      features:
        - "调解方案设计"
        - "仲裁程序指导"
        - "诉讼策略分析"
        - "和解谈判"
