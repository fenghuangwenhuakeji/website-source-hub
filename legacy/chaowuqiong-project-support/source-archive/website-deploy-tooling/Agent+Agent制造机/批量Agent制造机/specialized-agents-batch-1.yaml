        - "商标注册指导"
        - "专利申请咨询"
        - "著作权保护"
        - "侵权分析"
        - "知识产权布局"
      priority: high
      tags: ["知识产权", "商标", "专利"]

    - name: corporate-law-agent
      type: skill
      title: "公司法务专家"
      description: "处理公司设立、股权、治理、并购等法律事务"
      core_concept: "为企业发展保驾护航"
