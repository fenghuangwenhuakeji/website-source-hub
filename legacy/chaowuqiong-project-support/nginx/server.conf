server {
    listen 80;
    server_name 115.190.158.182;

    # 前端静态文件
    location / {
        root /var/www/chaowuqiong/apps/frontent/webuiapps/dist;
        try_files $uri $uri/ /index.html;

        # 禁用 index.html 缓存
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # JS/CSS 文件缓存 1年（因为文件名有哈希）
        location ~* \.(js|css)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # 前端路由支持 - 所有路径都返回 index.html
    location ~ ^/(login|register|recharge|chat|profile|settings|invite|packages|orders|referrals|exchange|durations|users|keys) {
        root /var/www/chaowuqiong/apps/frontent/webuiapps/dist;
        try_files $uri $uri/ /index.html;
    }

    # Admin 路由支持
    location /admin {
        alias /var/www/chaowuqiong/apps/frontent/webuiapps/dist;
        try_files $uri $uri/ /index.html;
    }

    # 静态资源 - 统一处理 assets 路径
    location /assets/ {
        root /var/www/chaowuqiong/apps/frontent/webuiapps/dist;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # WebUIApps API 代理 - 保留 /api 前缀
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 后端API (备用，如果后端也在3000)
    location /backend/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
