<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .game-container {
            display: flex;
            gap: 30px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .game-board {
            position: relative;
        }
        canvas {
            border: 3px solid #4a90d9;
            border-radius: 10px;
            background: #0a0a0a;
            box-shadow: 0 0 20px rgba(74, 144, 217, 0.3);
        }
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            color: #fff;
        }
        .info-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .info-box h3 {
            margin-bottom: 10px;
            color: #4a90d9;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .info-box .value {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
        }
        .next-piece canvas {
            width: 120px;
            height: 120px;
            border: 2px solid #4a90d9;
        }
        .controls {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
        }
        .controls h3 {
            margin-bottom: 15px;
            color: #4a90d9;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .controls p {
            margin: 8px 0;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
        }
        .controls span {
            display: inline-block;
            background: rgba(74, 144, 217, 0.3);
            padding: 3px 10px;
            border-radius: 5px;
            margin-right: 8px;
            font-family: monospace;
        }
        .btn {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-start {
            background: linear-gradient(135deg, #4a90d9 0%, #357abd 100%);
            color: white;
        }
        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(74, 144, 217, 0.4);
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
        }
        .game-over h2 {
            color: #ff6b6b;
            font-size: 36px;
            margin-bottom: 20px;
        }
        .game-over p {
            color: #fff;
            font-size: 20px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-board">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
            <div class="game-over" id="gameOver">
                <h2>游戏结束</h2>
                <p>最终得分: <span id="finalScore">0</span></p>
                <button class="btn btn-start" onclick="startGame()">重新开始</button>
            </div>
        </div>
        <div class="side-panel">
            <div class="info-box">
                <h3>得分</h3>
                <div class="value" id="score">0</div>
            </div>
            <div class="info-box">
                <h3>等级</h3>
                <div class="value" id="level">1</div>
            </div>
            <div class="info-box">
                <h3>行数</h3>
                <div class="value" id="lines">0</div>
            </div>
            <div class="info-box next-piece">
                <h3>下一个</h3>
                <canvas id="nextCanvas" width="120" height="120"></canvas>
            </div>
            <div class="controls">
                <h3>操作说明</h3>
                <p><span>←</span> 左移</p>
                <p><span>→</span> 右移</p>
                <p><span>↓</span> 加速下落</p>
                <p><span>↑</span> 旋转</p>
                <p><span>空格</span> 直接落下</p>
                <p><span>P</span> 暂停</p>
            </div>
            <button class="btn btn-start" id="startBtn" onclick="startGame()">开始游戏</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');

        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;

        const COLORS = {
            I: '#00f5ff',
            O: '#ffee00',
            T: '#bd00ff',
            S: '#00ff88',
            Z: '#ff0044',
            J: '#0066ff',
            L: '#ff8800'
        };

        const SHAPES = {
            I: [[1, 1, 1, 1]],
            O: [[1, 1], [1, 1]],
            T: [[0, 1, 0], [1, 1, 1]],
            S: [[0, 1, 1], [1, 1, 0]],
            Z: [[1, 1, 0], [0, 1, 1]],
            J: [[1, 0, 0], [1, 1, 1]],
            L: [[0, 0, 1], [1, 1, 1]]
        };

        let board = [];
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let level = 1;
        let lines = 0;
        let gameLoop = null;
        let isPaused = false;
        let isGameOver = false;

        function createBoard() {
            return Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
        }

        function createPiece(type) {
            return {
                type: type,
                shape: SHAPES[type],
                color: COLORS[type],
                x: Math.floor((COLS - SHAPES[type][0].length) / 2),
                y: 0
            };
        }

        function randomPiece() {
            const types = Object.keys(SHAPES);
            const type = types[Math.floor(Math.random() * types.length)];
            return createPiece(type);
        }

        function drawBlock(ctx, x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 2, 4);
        }

        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            ctx.strokeStyle = 'rgba(74, 144, 217, 0.1)';
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * BLOCK_SIZE, 0);
                ctx.lineTo(i * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * BLOCK_SIZE);
                ctx.lineTo(canvas.width, i * BLOCK_SIZE);
                ctx.stroke();
            }

            // 绘制已固定的方块
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c]) {
                        drawBlock(ctx, c, r, board[r][c]);
                    }
                }
            }

            // 绘制当前方块
            if (currentPiece) {
                // 绘制影子
                let shadowY = currentPiece.y;
                while (isValidMove(currentPiece.shape, currentPiece.x, shadowY + 1)) {
                    shadowY++;
                }
                if (shadowY !== currentPiece.y) {
                    ctx.globalAlpha = 0.3;
                    for (let r = 0; r < currentPiece.shape.length; r++) {
                        for (let c = 0; c < currentPiece.shape[r].length; c++) {
                            if (currentPiece.shape[r][c]) {
                                drawBlock(ctx, currentPiece.x + c, shadowY + r, currentPiece.color);
                            }
                        }
                    }
                    ctx.globalAlpha = 1;
                }

                // 绘制当前方块
                for (let r = 0; r < currentPiece.shape.length; r++) {
                    for (let c = 0; c < currentPiece.shape[r].length; c++) {
                        if (currentPiece.shape[r][c]) {
                            drawBlock(ctx, currentPiece.x + c, currentPiece.y + r, currentPiece.color);
                        }
                    }
                }
            }
        }

        function drawNextPiece() {
            nextCtx.fillStyle = '#0a0a0a';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

            if (!nextPiece) return;

            const size = 25;
            const offsetX = (nextCanvas.width - nextPiece.shape[0].length * size) / 2;
            const offsetY = (nextCanvas.height - nextPiece.shape.length * size) / 2;

            for (let r = 0; r < nextPiece.shape.length; r++) {
                for (let c = 0; c < nextPiece.shape[r].length; c++) {
                    if (nextPiece.shape[r][c]) {
                        nextCtx.fillStyle = nextPiece.color;
                        nextCtx.fillRect(
                            offsetX + c * size,
                            offsetY + r * size,
                            size - 2,
                            size - 2
                        );
                    }
                }
            }
        }

        function isValidMove(shape, x, y) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const newX = x + c;
                        const newY = y + r;
                        if (newX < 0 || newX >= COLS || newY >= ROWS) return false;
                        if (newY >= 0 && board[newY][newX]) return false;
                    }
                }
            }
            return true;
        }

        function rotatePiece() {
            const rotated = currentPiece.shape[0].map((_, i) =>
                currentPiece.shape.map(row => row[i]).reverse()
            );
            if (isValidMove(rotated, currentPiece.x, currentPiece.y)) {
                currentPiece.shape = rotated;
            }
        }

        function lockPiece() {
            for (let r = 0; r < currentPiece.shape.length; r++) {
                for (let c
