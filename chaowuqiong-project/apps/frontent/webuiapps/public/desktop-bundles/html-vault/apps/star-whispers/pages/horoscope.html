<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="../assets/css/all.min.css">
    <link rel="stylesheet" href="../css/home.css">
    <style>
        .zodiac-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 16px;
        }
        
        .zodiac-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 8px;
            background: rgba(255,255,255,0.05);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition-fast);
            border: 2px solid transparent;
        }
        
        .zodiac-item:hover, .zodiac-item.active {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent-color);
        }
        
        .zodiac-symbol {
            font-size: 28px;
            margin-bottom: 6px;
        }
        
        .zodiac-name {
            font-size: 13px;
        }
        
        .fortune-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin: 16px;
        }
        
        .fortune-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .fortune-title {
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .fortune-date {
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .fortune-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .fortune-item {
            background: rgba(255,255,255,0.05);
            padding: 16px;
            border-radius: var(--radius-md);
            text-align: center;
        }
        
        .fortune-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .fortune-stars {
            font-size: 16px;
        }
        
        .fortune-advice {
            background: rgba(255,255,255,0.05);
            padding: 16px;
            border-radius: var(--radius-md);
            margin-bottom: 16px;
        }
        
        .fortune-advice h4 {
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--accent-color);
        }
        
        .fortune-advice p {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-secondary);
        }
        
        .fortune-lucky {
            display: flex;
            justify-content: space-around;
            padding: 16px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: var(--radius-md);
        }
        
        .fortune-lucky span {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }
        
        /* 详细分析区域 */
        .detail-section {
            margin: 16px;
        }
        
        .detail-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 16px;
        }
        
        .detail-card h3 {
            font-size: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .detail-item {
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: var(--radius-md);
        }
        
        .detail-item-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        
        .detail-item-value {
            font-size: 14px;
        }
        
        /* AI解读按钮 */
        .ai-analysis-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px;
            background: var(--primary-gradient);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-size: 15px;
            cursor: pointer;
            margin: 16px;
            margin-bottom: 0;
            transition: all 0.2s ease;
        }
        
        .ai-analysis-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .ai-analysis-btn.loading {
            opacity: 0.7;
            pointer-events: none;
        }
        
        .ai-analysis-result {
            background: rgba(255,255,255,0.05);
            border-radius: var(--radius-md);
            padding: 16px;
            margin: 16px;
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-secondary);
            display: none;
        }
        
        .ai-analysis-result.active {
            display: block;
        }
        
        .result-actions {
            display: flex;
            gap: 12px;
            padding: 16px;
        }
        
        .result-actions .btn {
            flex: 1;
        }
        
        /* 性格特点标签 */
        .trait-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .trait-tag {
            padding: 6px 12px;
            background: var(--primary-gradient);
            border-radius: 16px;
            font-size: 12px;
        }
        
        /* 配对分析 */
        .compatibility-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .compatibility-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: var(--radius-md);
        }
        
        .compatibility-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .compatibility-symbol {
            font-size: 24px;
        }
        
        .compatibility-bar {
            width: 100px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .compatibility-fill {
            height: 100%;
            background: var(--primary-gradient);
            border-radius: 3px;
        }
        
        /* 思考动画 */
        .thinking-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--accent-color);
        }
        
        .thinking-indicator .dot {
            width: 6px;
            height: 6px;
            background: var(--accent-color);
            border-radius: 50%;
            animation: dotFade 1.4s ease-in-out infinite;
        }
        
        .thinking-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
        .thinking-indicator .dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes dotFade {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>

                personality: '双鱼座是水象星座，象征着灵性和梦想。双鱼座的人感情丰富，富有想象力和同情心。他们直觉敏锐，艺术天赋强，但有时过于理想化和逃避现实。',
                best: ['巨蟹座', '天蝎座', '金牛座'], worst: ['双子座', '射手座', '处女座'],
                color: '海蓝色、紫色', number: '7', direction: '东南方',
                strength: '富有同情心，艺术天分', weakness: '过于理想化，逃避现实'
            }
        };

        class HoroscopePage {
            constructor() {
                this.currentZodiac = null;
                this.bindEvents();
            }

            bindEvents() {
                const zodiacList = document.getElementById('zodiac-list');
                zodiacList?.addEventListener('click', (e) => {
                    const item = e.target.closest('.zodiac-item');
                    if (item) {
                        this.showFortune(item.dataset.zodiac);
                    }
                });

                document.getElementById('backBtn')?.addEventListener('click', () => this.backToSelect());
                document.getElementById('aiAnalysisBtn')?.addEventListener('click', () => this.getAIAnalysis());
            }

            showFortune(zodiac) {
                this.currentZodiac = zodiac;
                const data = zodiacData[zodiac];
                const fortune = this.calculateFortune(zodiac);

                // 更新头部
                document.getElementById('zodiacSymbol').textContent = data.symbol;
                document.getElementById('zodiacTitle').textContent = data.name;
                
                const today = new Date();
                document.getElementById('fortuneDate').textContent = 
                    `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日`;

                // 运势评分
                document.getElementById('fortuneGrid').innerHTML = `
                    <div class="fortune-item">
                        <div class="fortune-label">综合运势</div>
                        <div class="fortune-stars">${'⭐'.repeat(fortune.overall)}</div>
                    </div>
                    <div class="fortune-item">
                        <div class="fortune-label">爱情运势</div>
                        <div class="fortune-stars">${'💕'.repeat(fortune.love)}</div>
                    </div>
                    <div class="fortune-item">
                        <div class="fortune-label">事业运势</div>
                        <div class="fortune-stars">${'📈'.repeat(fortune.career)}</div>
                    </div>
                    <div class="fortune-item">
                        <div class="fortune-label">财富运势</div>
                        <div class="fortune-stars">${'💰'.repeat(fortune.wealth)}</div>
                    </div>
                `;

                // 今日建议
                document.getElementById('fortuneAdvice').innerHTML = `
                    <h4>💡 今日建议</h4>
                    <p>${fortune.advice}</p>
                `;

                // 幸运元素
                document.getElementById('fortuneLucky').innerHTML = `
                    <span><i class="fas fa-palette"></i> 幸运色: ${fortune.luckyColor}</span>
                    <span><i class="fas fa-hashtag"></i> 幸运数: ${fortune.luckyNumber}</span>
                    <span><i class="fas fa-compass"></i> 幸运方位: ${data.direction}</span>
                `;

                // 性格特点
                document.getElementById('personalityContent').innerHTML = `
                    <p style="font-size: 14px; line-height: 1.8; color: var(--text-secondary); margin-bottom: 12px;">
                        ${data.personality}
                    </p>
                    <div class="trait-tags">
                        ${data.traits.map(t => `<span class="trait-tag">${t}</span>`).join('')}
                    </div>
                `;

                // 配对分析
                document.getElementById('compatibilityContent').innerHTML = `
                    <div class="compatibility-list">
                        ${data.best.map((name, i) => {
                            const zKey = Object.keys(zodiacData).find(k => zodiacData[k].name === name);
                            const percent = [95, 88, 80][i];
                            return `
                                <div class="compatibility-item">
                                    <div class="compatibility-info">
                                        <span class="compatibility-symbol">${zodiacData[zKey]?.symbol || '⭐'}</span>
                                        <span>${name}</span>
                                    </div>
                                    <div class="compatibility-bar">
                                        <div class="compatibility-fill" style="width: ${percent}%"></div>
                                    </div>
                                    <span style="font-size: 12px; color: var(--accent-color);">${percent}%</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;

                // 星座档案
                document.getElementById('zodiacProfile').innerHTML = `
                    <div class="detail-item">
                        <div class="detail-item-label">日期</div>
                        <div class="detail-item-value">${data.date}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-item-label">守护星</div>
                        <div class="detail-item-value">${data.ruler}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-item-label">元素</div>
                        <div class="detail-item-value">${data.element}象星座</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-item-label">幸运色</div>
                        <div class="detail-item-value">${data.color}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-item-label">优点</div>
                        <div class="detail-item-value">${data.strength}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-item-label">弱点</div>
                        <div class="detail-item-value">${data.weakness}</div>
                    </div>
                `;

                // 切换视图
                document.getElementById('selectView').style.display = 'none';
                document.getElementById('resultView').style.display = 'block';
                
                // 重置AI分析结果
                document.getElementById('aiAnalysisResult').classList.remove('active');
                document.getElementById('aiAnalysisResult').innerHTML = '';
            }

            calculateFortune(zodiac) {
                const today = new Date();
                const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate() + zodiac.length * 1000;
                
                const random = (offset) => {
                    const x = Math.sin(seed + offset) * 10000;
                    return Math.floor((x - Math.floor(x)) * 3) + 3;
                };

                const colors = ['红色', '橙色', '黄色', '绿色', '蓝色', '紫色', '粉色', '白色', '金色', '银色'];
                const advices = [
                    '今天适合开展新计划，勇于尝试会带来意想不到的收获。保持积极心态，好运自然来。',
                    '今日宜静不宜动，适合反思和规划。与朋友交流可以获得新的灵感和见解。',
                    '财运亨通的一天，可以适当进行投资或购物。感情方面可能会有惊喜。',
                    '工作中可能遇到挑战，但这也是展示能力的好机会。保持冷静，问题会迎刃而解。',
                    '适合社交和拓展人脉，你的人格魅力今天特别强。单身者有望遇到心仪对象。',
                    '学习运势不错，适合充电和提升自己。已经学过的知识今天会有新的领悟。',
                    '健康方面需要注意，适当休息很重要。可以进行一些放松身心的活动。',
                    '创意灵感源源不断，是艺术家和创作者的幸运日。把想法付诸行动会有好结果。'
                ];

                return {
                    overall: random(1),
                    love: random(2),
                    career: random(3),
                    wealth: random(4),
                    advice: advices[Math.abs(Math.sin(seed * 7) * 10000 | 0) % advices.length],
                    luckyColor: colors[Math.abs(Math.sin(seed * 3) * 10000 | 0) % colors.length],
                    luckyNumber: Math.abs(Math.sin(seed * 5) * 10000 | 0) % 9 + 1
                };
            }

            backToSelect() {
                document.getElementById('selectView').style.display = 'block';
                document.getElementById('resultView').style.display = 'none';
            }

            async getAIAnalysis() {
                if (!this.currentZodiac) return;

                const btn = document.getElementById('aiAnalysisBtn');
                const result = document.getElementById('aiAnalysisResult');

                btn.classList.add('loading');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>正在解读中...</span>';

                const data = zodiacData[this.currentZodiac];
                const fortune = this.calculateFortune(this.currentZodiac);
                const today = new Date();

                const prompt = `请作为专业的星座运势分析师，为${data.name}进行今日运势深度解读：

【基本信息】
- 星座：${data.name}（${data.date}）
- 元素：${data.element}象星座
- 守护星：${data.ruler}
- 性格特点：${data.traits.join('、')}

【今日运势评分】（满分5星）
- 综合运势：${'⭐'.repeat(fortune.overall)}
- 爱情运势：${'⭐'.repeat(fortune.love)}
- 事业运势：${'⭐'.repeat(fortune.career)}
- 财富运势：${'⭐'.repeat(fortune.wealth)}

【幸运元素】
- 幸运色：${fortune.luckyColor}
- 幸运数：${fortune.luckyNumber}
- 幸运方位：${data.direction}

【今日建议】${fortune.advice}

请从以下几个方面进行专业解读（每项60-80字）：
1. 整体运势分析：结合星座特点解读今日运势走向
2. 爱情指南：单身和有伴人士的今日感情建议
3. 事业学业：工作学习方面的注意事项和机遇
4. 财富理财：财务方面的建议和警示
5. 健康提醒：身心健康的注意事项
6. 开运秘籍：如何利用幸运元素提升今日运势

请用温暖鼓励的语气，给出积极正面的解读。`;

                try {
                    const config = ApiManager.getActiveConfig();
                    if (!config) {
                        throw new Error('请先在设置中配置并激活API');
                    }

                    let fullResponse = '';
                    await ApiManager.callLLM([
                        { role: 'system', content: '你是一位专业的星座运势分析师，拥有丰富的占星知识，善于用温暖积极的语言为人们解读星座运势，给予鼓励和建议。' },
                        { role: 'user', content: prompt }
                    ], (chunk, full) => {
                        fullResponse = full;
                        result.innerHTML = fullResponse.replace(/\n/g, '<br>');
                        result.classList.add('active');
                    });

                } catch (error) {
                    result.innerHTML = `<div style="color: #E74C3C;">解读失败：${error.message}</div>`;
                    result.classList.add('active');
                } finally {
                    btn.classList.remove('loading');
                    btn.innerHTML = '<i class="fas fa-robot"></i> <span>AI深度解读运势</span>';
                }
            }
        }

        window.addEventListener('DOMContentLoaded', () => new HoroscopePage());
    </script>
</body>
</html>
