<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 贪吃蛇</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-dark: #0d1117;
  --bg-card: #161b22;
  --bg-input: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --accent: #f0883e;
  --accent-light: #ffa657;
  --success: #3fb950;
  --danger: #f85149;
  --step-active: #388bfd;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-dark);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* 顶部导航 */
.header {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
.header-actions { display: flex; gap: 0.75rem; }
.btn {
  padding: 0.5rem 1rem;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text);
  cursor: pointer;
  font-size: 0.875rem;
  transition: all 0.2s;
}
.btn:hover { background: var(--border); }
.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
  font-weight: 600;
}
.btn-primary:hover { background: var(--accent-light); }

/* 主布局 */
.main-container {
  display: flex;
  min-height: calc(100vh - 60px);
}

/* 左侧面板 */
.sidebar {
  width: 280px;
  background: var(--bg-card);
  border-right: 1px solid var(--border);
  padding: 1.5rem;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.card {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.25rem;
}
.card h3 {
  font-size: 1rem;
  margin-bottom: 0.75rem;
  color: var(--accent);
}
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
}
.stat-item {
  text-align: center;
  padding: 0.75rem 0.5rem;
  background: var(--bg-card);
  border-radius: 8px;
  border: 1px solid var(--border);
}
.stat-item .label {
  font-size: 0.7rem;
  color: var(--text-muted);
}
.stat-item .value {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--accent);
  margin-top: 0.15rem;
}
.stat-item .value.green { color: var(--success); }
.stat-item .value.blue { color: var(--step-active); }

.speed-bar {
  height: 6px;
  background: var(--bg-card);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 0.5rem;
}
.speed-bar .fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.3s;
  border-radius: 3px;
}

.key-list { display: flex; flex-direction: column; gap: 0.4rem; }
.key-row { display: flex; align-items: center; gap: 0.6rem; }
.key {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 32px;
  height: 28px;
  padding: 0 8px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-muted);
}
.key-row span { color: var(--text-muted); font-size: 0.8rem }

/* 提示框 */
.tip-box {
  background: rgba(56, 139, 253, 0.1);
  border: 1px solid rgba(56, 139, 253, 0.3);
  border-radius: 8px;
  padding: 1rem;
  font-size: 0.85rem;
}
.tip-box strong { color: var(--step-active); }

/* 游戏区域 */
.game-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  position: relative;
}
.canvas-wrapper {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  border: 2px solid var(--border);
  box-shadow: 0 0 40px rgba(240, 136, 62, 0.08);
}
#gameCanvas {
  display: block;
  background: #0a0e14;
}

/* 遮罩层 */
.overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(13, 17, 23, 0.88);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  z-index: 10;
}
.overlay.hidden { display: none; }
.overlay h2 {
  font-size: 2rem;
  color: var(--accent);
  margin-bottom: 0.5rem;
}
.overlay p {
  color: var(--text-muted);
  margin-bottom: 1.5rem;
  font-size: 0.95rem;
}
.overlay .final-score {
  font-size: 3rem;
  font-weight: 700;
  color: var(--accent);
  margin: 0.5rem 0 1rem;
}

/* 吃到食物的飘字 */
.float-text {
  position: absolute;
  color: var(--success);
  font-weight: 700;
  font-size: 1.1rem;
  pointer-events: none;
  z-index: 20;
  opacity: 1;
}

/* 历史记录 */
.history-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.5rem 0.6rem;
  background: var(--bg-card);
  border-radius: 6px;
  margin-bottom: 0.4rem;
  font-size: 0.8rem;
  border: 1px solid var(--border);
}
.history-item .rank {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 700;
  background: var(--bg-input);
  color: var(--text-muted);
  flex-shrink: 0;
}
.history-item .rank.gold { background: #f0883e; color: #000; }
.history-item .rank.silver { background: #8b949e; color: #000; }
.history-item .rank.bronze { background: #6e4a2a; color: #fff; }

/* 手机方向键 */
.mobile-controls {
  display: none;
  margin-top: 1rem;
  gap: 0.4rem;
}
.dpad {
  display: grid;
  grid-template-columns: repeat(3, 56px);
  grid-template-rows: repeat(3, 56px);
  gap: 4px;
  justify-content: center;
}
.dpad .d-btn {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.dpad .d-btn:active {
  background: var(--accent);
  color: #000;
}
.dpad .d-empty { background: transparent; border: none; }

/* 响应式 */
@media (max-width: 900px) {
  .main-container { flex-direction: column; }
  .sidebar {
    width: 100%;
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 1rem;
    flex-direction: row;
    flex-wrap: wrap;
  }
  .sidebar .card { flex: 1; min-width: 200px; }
  .sidebar .card.hide-mobile { display: none; }
  .game-area { padding: 1rem; }
  .mobile-controls { display: flex; flex-direction: column; align-items: center; }
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">🐍 贪吃蛇</div>
  <div class="header-actions">
    <button class="btn" onclick="togglePause()">⏸ 暂停</button>
    <button class="btn btn-primary" onclick="resetGame()">🔄 重新开始</button>
  </div>
</header>

<div class="main-container">
  <!-- 左侧信息栏 -->
  <nav class="sidebar">
    <!-- 分数面板 -->
    <div class="card">
      <h3>📊 游戏数据</h3>
      <div class="stat-grid">
        <div class="stat-item">
          <div class="label">当前得分</div>
          <div class="value" id="scoreDisplay">0</div>
        </div>
        <div class="stat-item">
          <div class="label">最高记录</div>
          <div class="value green" id="highScoreDisplay">0</div>
        </div>
        <div class="stat-item">
          <div class="label">当前等级</div>
          <div class="value blue" id="levelDisplay">1</div>
        </div>
        <div class="stat-item">
          <div class="label">蛇身长度</div>
          <div class="value" id="lengthDisplay">3</div>
        </div>
      </div>
      <div style="margin-top: 0.75rem;">
        <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
          <span style="color: var(--text-muted);">速度</span>
          <span style="color: var(--accent);" id="speedLabel">1 / 10</span>
        </div>
        <div class="speed-bar">
          <div class="fill" id="speedFill" style="width: 10%;"></div>
        </div>
      </div>
    </div>

    <!-- 操作说明 -->
    <div class="card hide-mobile">
      <h3>🕹️ 操作说明</h3>
      <div class="key-list">
        <div class="key-row"><span class="key">W</span><span class="key">↑</span><span>向上移动</span></div>
        <div class="key-row"><span class="key">S</span><span class="key">↓</span><span>向下移动</span></div>
        <div class="key-row"><span class="key">A</span><span class="key">←</span><span>向左移动</span></div>
        <div class="key-row"><span class="key">D</span><span class="key">→</span><span>向右移动</span></div>
        <div class="key-row"><span class="key">Space</span><span>暂停 / 继续</span></div>
      </div>
    </div>

    <!-- 规则 -->
    <div class="card hide-mobile">
      <h3>📋 游戏规则</h3>
      <div class="tip-box">
        <strong>玩法：</strong><br>
        控制蛇吃掉食物来增长身体和得分<br><br>
        <strong>升级：</strong><br>
        每吃 5 个食物升一级，速度加快<br><br>
        <strong>结束：</strong><br>
        撞墙或撞到自己则游戏结束
      </div>
    </div>

    <!-- 历史记录 -->
    <div class="card">
      <h3>🏆 排行榜</h3>
      <div id="historyList">
        <p style="color: var(--text-muted); text-align: center; padding: 0.5rem; font-size: 0.8rem;">暂无记录</p>
      </div>
    </div>
  </nav>

  <!-- 游戏区域 -->
  <main class="game-area">
    <div>
      <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="gameCanvas"></canvas>
        <!-- 开始遮罩 -->
        <div class="overlay" id="startOverlay">
          <h2>🐍 贪吃蛇</h2>
          <p>经典小游戏，准备好了吗？</p>
          <button class="btn btn-primary" style="padding: 0.75rem 2rem; font-size: 1rem;" onclick="startGame()">开始游戏</button>
        </div>
        <!-- 暂停遮罩 -->
        <div class="overlay hidden" id="pauseOverlay">
          <h2>⏸ 已暂停</h2>
          <p>按空格键或点击按钮继续</p>
          <button class="btn btn-primary" style="padding: 0.75rem 2rem; font-size: 1rem;" onclick="togglePause()">继续游戏</button>
        </div>
        <!-- 结束遮罩 -->
        <div class="overlay hidden" id="gameOverOverlay">
          <h2>游戏结束</h2>
          <div class="final-score" id="finalScore">0</div>
          <p id="gameOverMsg">再接再厉！</p>
          <button class="btn btn-primary" style="padding: 0.75rem 2rem; font-size: 1rem;" onclick="resetGame()">再来一局</button>
        </div>
      </div>
      <!-- 手机虚拟方向键 -->
      <div class="mobile-controls">
        <div class="dpad">
          <div class="d-empty"></div>
          <div class="d-btn" ontouchstart="setDir(0,-1)">▲</div>
          <div class="d-empty"></div>
          <div class="d-btn" ontouchstart="setDir(-1,0)">◀</div>
          <div class="d-btn" style="font-size:0.7rem;" ontouchstart="togglePause()">⏸</div>
          <div class="d-btn" ontouchstart="setDir(1,0)">▶</div>
          <div class="d-empty"></div>
          <div class="d-btn" ontouchstart="setDir(0,1)">▼</div>
          <div class="d-empty"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// ========== 游戏配置 ==========
var COLS = 25;       // 列数
var ROWS = 25;       // 行数
var CELL = 20;       // 每格像素
var BASE_SPEED = 150; // 初始间隔（毫秒）

// ========== 游戏状态 ==========
var snake = [];       // 蛇身坐标数组 [{x, y}, ...]
var dir = {x: 1, y: 0};      // 当前方向
var nextDir = {x: 1, y: 0};  // 下一帧方向（防止同帧反向）
var food = {x: 0, y: 0};     // 食物坐标
var score = 0;
var level = 1;
var highScore = 0;
var eatCount = 0;     // 本局吃了几个
var gameRunning = false;
var gamePaused = false;
var gameTimer = null;
var history = [];      // 历史记录

// ========== DOM 引用 ==========
var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');
var canvasWrapper = document.getElementById('canvasWrapper');

// ========== 初始化画布尺寸 ==========
function initCanvas() {
  // 根据可用空间自适应
  var area = document.querySelector('.game-area');
  var maxW = area.clientWidth - 64;
  var maxH = area.clientHeight - 160;
  var cellSize = Math.floor(Math.min(maxW / COLS, maxH / ROWS));
  cellSize = Math.max(12, Math.min(cellSize, 24));
  CELL = cellSize;
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;
}

// ========== 读取本地最高分 ==========
function loadHighScore() {
  var saved = localStorage.getItem('snakeHighScore');
  if (saved) highScore = parseInt(saved) || 0;
  var h = localStorage.getItem('snakeHistory');
  if (h) {
    try { history = JSON.parse(h); } catch(e) { history = []; }
  }
}

// ========== 保存数据 ==========
function saveData() {
  localStorage.setItem('snakeHighScore', highScore);
  localStorage.setItem('snakeHistory', JSON.stringify(history.slice(0, 10)));
}

// ========== 初始化蛇 ==========
function initSnake() {
  snake = [];
  var startX = Math.floor(COLS / 2);
  var startY = Math.floor(ROWS / 2);
  for (var i = 0; i < 3; i++) {
    snake.push({x: startX - i, y: startY});
  }
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
}

// ========== 随机放置食物 ==========
function placeFood() {
  var valid = false;
  while (!valid) {
    food.x = Math.floor(Math.random() * COLS);
    food.y = Math.floor(Math.random() * ROWS);
    valid = true;
    for (var i = 0; i < snake.length; i++) {
      if (snake[i].x === food.x && snake[i].y === food.y) {
        valid = false;
        break;
      }
    }
  }
}

// ========== 绘制 ==========
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 绘制网格（淡线）
  ctx.strokeStyle = '#151b23';
  ctx.lineWidth = 0.5;
  for (var i = 0; i <= COLS; i++) {
    ctx.beginPath();
    ctx.moveTo(i * CELL, 0);
    ctx.lineTo(i * CELL, canvas.height);
    ctx.stroke();
  }
  for (var j = 0; j <= ROWS; j++) {
    ctx.beginPath();
    ctx.moveTo(0, j * CELL);
    ctx.lineTo(canvas.width, j * CELL);
    ctx.stroke();
  }

  // 绘制食物（带发光效果）
  var fx = food.x * CELL + CELL / 2;
  var fy = food.y * CELL + CELL / 2;
  var glowRadius = Math.max(1, CELL * 1.2);
  var glow = ctx.createRadialGradient(fx, fy, 0, fx, fy, glowRadius);
  glow.addColorStop(0, 'rgba(248, 81, 73, 0.35)');
  glow.addColorStop(1, 'rgba(248, 81, 73, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(fx - glowRadius, fy - glowRadius, glowRadius * 2, glowRadius * 2);

  ctx.fillStyle = '#f85149';
  ctx.beginPath();
  var foodR = Math.max(1, CELL * 0.38);
  ctx.arc(fx, fy, foodR, 0, Math.PI * 2);
  ctx.fill();

  // 绘制蛇
  for (var i = snake.length - 1; i >= 0; i--) {
    var seg = snake[i];
    var px = seg.x * CELL;
    var py = seg.y * CELL;
    var pad = 1;

    if (i === 0) {
      // 蛇头
      ctx.fillStyle = '#ffa657';
      ctx.shadowColor = 'rgba(240, 136, 62, 0.5)';
      ctx.shadowBlur = 8;
      roundRect(px + pad, py + pad, CELL - pad * 2, CELL - pad * 2, Math.max(1, CELL * 0.3));
      ctx.fill();
      ctx.shadowBlur = 0;

      // 画眼睛
      drawEyes(px, py);
    } else {
      // 蛇身 - 渐变淡
      var ratio = 1 - (i / snake.length) * 0.55;
      var r = Math.round(240 * ratio);
      var g = Math.round(136 * ratio);
      var b = Math.round(62 * ratio);
      ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
      roundRect(px + pad, py + pad, CELL - pad * 2, CELL - pad * 2, Math.max(1, CELL * 0.22));
      ctx.fill();
    }
  }
}

// 圆角矩形
function roundRect(x, y, w, h, r) {
  r = Math.max(0, Math.min(r, Math.min(w, h) / 2));
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// 画蛇眼睛
function drawEyes(px, py) {
  var eyeR = Math.max(1, CELL * 0.12);
  var offset = CELL * 0.22;
  var cx = px + CELL / 2;
  var cy = py + CELL / 2;
  var e1x, e1y, e2x, e2y;

  if (dir.x === 1) {
    e1x = cx + offset; e1y = cy - offset;
    e2x = cx + offset; e2y = cy + offset;
  } else if (dir.x === -1) {
    e1x = cx - offset; e1y = cy - offset;
    e2x = cx - offset; e2y = cy + offset;
  } else if (dir.y === -1) {
    e1x = cx - offset; e1y = cy - offset;
    e2x = cx + offset; e2y = cy - offset;
  } else {
    e1x = cx - offset; e1y = cy + offset;
    e2x = cx + offset; e2y = cy + offset;
  }

  ctx.fillStyle = '#0d1117';
  ctx.beginPath();
  ctx.arc(e1x, e1y, eyeR, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(e2x, e2y, eyeR, 0, Math.PI * 2);
  ctx.fill();
}

// ========== 游戏逻辑 ==========
function gameStep() {
  // 应用方向
  dir.x = nextDir.x;
  dir.y = nextDir.y;

  // 新蛇头
  var head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // 碰墙检测
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    gameOver();
    return;
  }

  // 碰自身检测
  for (var i = 0; i < snake.length; i++) {
    if (snake[i].x === head.x && snake[i].y === head.y) {
      gameOver();
      return;
    }
  }

  snake.unshift(head);

  // 吃食物
  if (head.x === food.x && head.y === food.y) {
    score += level * 10;
    eatCount++;
    showFloatText('+' + (level * 10), food.x * CELL, food.y * CELL);

    // 升级判断
    if (eatCount % 5 === 0 && level < 10) {
      level++;
      showFloatText('LEVEL UP!', food.x * CELL - 20, food.y * CELL - 18);
      clearInterval(gameTimer);
      var speed = BASE_SPEED - (level - 1) * 12;
      speed = Math.max(40, speed);
      gameTimer = setInterval(gameStep, speed);
    }

    placeFood();
    updateUI();
  } else {
    snake.pop();
  }

  draw();
}

// ========== 飘字动画 ==========
function showFloatText(text, x, y) {
  var el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  canvasWrapper.appendChild(el);

  var opacity = 1;
  var top = parseFloat(y);
  var timer = setInterval(function() {
    opacity -= 0.04;
    top -= 1.2;
    if (opacity <= 0) {
      clearInterval(timer);
      canvasWrapper.removeChild(el);
      return;
    }
    el.style.opacity = opacity;
    el.style.top = top + 'px';
  }, 20);
}

// ========== 游戏结束 ==========
function gameOver() {
  gameRunning = false;
  clearInterval(gameTimer);

  // 更新最高分
  if (score > highScore) {
    highScore = score;
  }

  // 记录历史
  var now = new Date();
  var timeStr = now.getHours() + ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
  history.unshift({score: score, level: level, length: snake.length, time: timeStr});
  if (history.length > 10) history = history.slice(0, 10);
  saveData();

  // 显示结束界面
  document.getElementById('finalScore').textContent = score;
  if (score >= highScore && score > 0) {
    document.getElementById('gameOverMsg').textContent = '新纪录！太厉害了！';
  } else if (score > 100) {
    document.getElementById('gameOverMsg').textContent = '表现不错，继续加油！';
  } else {
    document.getElementById('gameOverMsg').textContent = '再接再厉！';
  }
  document.getElementById('gameOverOverlay').classList.remove('hidden');

  updateUI();
  renderHistory();
}

// ========== 开始游戏 ==========
function startGame() {
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('gameOverOverlay').classList.add('hidden');
  document.getElementById('pauseOverlay').classList.add('hidden');

  score = 0;
  level = 1;
  eatCount = 0;
  gamePaused = false;
  gameRunning = true;

  initSnake();
  placeFood();
  updateUI();
  draw();

  clearInterval(gameTimer);
  gameTimer = setInterval(gameStep, BASE_SPEED);
}

// ========== 重新开始 ==========
function resetGame() {
  clearInterval(gameTimer);
  gameRunning = false;
  gamePaused = false;
  startGame();
}

// ========== 暂停/继续 ==========
function togglePause() {
  if (!gameRunning) return;

  gamePaused = !gamePaused;
  if (gamePaused) {
    clearInterval(gameTimer);
    document.getElementById('pauseOverlay').classList.remove('hidden');
  } else {
    document.getElementById('pauseOverlay').classList.add('hidden');
    var speed = BASE_SPEED - (level - 1) * 12;
    speed = Math.max(40, speed);
    gameTimer = setInterval(gameStep, speed);
  }
}

// ========== 设置方向（手机用） ==========
function setDir(dx, dy) {
  if (!gameRunning || gamePaused) return;
  // 防止反向
  if (dir.x === -dx && dir.y === -dy) return;
  if (dx !== 0 && dir.x === -dx) return;
  if (dy !== 0 && dir.y === -dy) return;
  nextDir = {x: dx, y: dy};
}

// ========== 键盘监听 ==========
document.addEventListener('keydown', function(e) {
  var key = e.key;

  // 空格暂停
  if (key === ' ' || key === 'Spacebar') {
    e.preventDefault();
    if (gameRunning) togglePause();
    else if (!gameRunning && document.getElementById('startOverlay').classList.contains('hidden') === false) startGame();
    return;
  }

  if (!gameRunning || gamePaused) return;

  // 方向键和WASD
  if ((key === 'ArrowUp' || key === 'w' || key === 'W') && dir.y !== 1) {
    e.preventDefault();
    nextDir = {x: 0, y: -1};
  } else if ((key === 'ArrowDown' || key === 's' || key === 'S') && dir.y !== -1) {
    e.preventDefault();
    nextDir = {x: 0, y: 1};
  } else if ((key === 'ArrowLeft' || key === 'a' || key === 'A') && dir.x !== 1) {
    e.preventDefault();
    nextDir = {x: -1, y: 0};
  } else if ((key === 'ArrowRight' || key === 'd' || key === 'D') && dir.x !== -1) {
    e.preventDefault();
    nextDir = {x: 1, y: 0};
  }
});

// ========== 更新UI面板 ==========
function updateUI() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('highScoreDisplay').textContent = highScore;
  document.getElementById('levelDisplay').textContent = level;
  document.getElementById('lengthDisplay').textContent = snake.length;
  document.getElementById('speedLabel').textContent = level + ' / 10';
  document.getElementById('speedFill').style.width = (level * 10) + '%';
}

// ========== 渲染历史排行 ==========
function renderHistory() {
  var list = document.getElementById('historyList');
  if (history.length === 0) {
    list.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 0.5rem; font-size: 0.8rem;">暂无记录</p>';
    return;
  }
  var html = '';
  for (var i = 0; i < history.length && i < 5; i++) {
    var item = history[i];
    var rankClass = '';
    if (i === 0) rankClass = ' gold';
    else if (i === 1) rankClass = ' silver';
    else if (i === 2) rankClass = ' bronze';

    html += '<div class="history-item">'
      + '<div style="display:flex;align-items:center;gap:0.5rem;">'
      + '<span class="rank' + rankClass + '">' + (i + 1) + '</span>'
      + '<span>' + item.time + ' · Lv' + item.level + '</span>'
      + '</div>'
      + '<span style="color:var(--accent);font-weight:700;">' + item.score + '</span>'
      + '</div>';
  }
  list.innerHTML = html;
}

// ========== 窗口缩放重绘 ==========
window.addEventListener('resize', function() {
  initCanvas();
  draw();
});

// ========== 启动 ==========
loadHighScore();
initCanvas();
initSnake();
placeFood();
draw();
updateUI();
renderHistory();
</script>
</body>
